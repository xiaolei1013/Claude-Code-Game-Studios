    unit: multiplier
    notes: "Per-enemy throughput multiplier applied to formation_dps_per_tick inside _kill_schedule_for_loop (Combat Rule 10 / D.5) when the formation does NOT cross MatchupResolver's majority threshold for that enemy's archetype. Default 1.0 = baseline (disadvantaged runs are never punished, only denied the advantaged bonus) — Pillar 1 posture: no fail states. Tuning knob in combat_config.tres. Safe range: 0.5-1.0. Values below 1.0 convert disadvantaged into a soft punishment signal and should NOT be used unless first-playtest evidence strongly justifies."
    added: 2026-04-20
    revised: ""

