# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: GOLD_SANITY_CAP
    status: active
    source: design/gdd/economy-system.md
    referenced_by:
      - design/gdd/economy-system.md
    value: 1000000000000
    unit: gold
    notes: "1 T gold. Engineering ceiling; silently clamps gold_balance. Never displayed to player. int64 max is ~9.2e18 — this cap leaves six orders of magnitude of headroom. Tuning knob in economy_config.tres."
    added: 2026-04-18
    revised: ""

  - name: MATCHUP_GOLD_MULTIPLIER
