      - design/gdd/class-vs-enemy-matchup-resolver.md
    value: 1.5
    unit: multiplier
    notes: "Per-enemy throughput multiplier applied to formation_dps_per_tick inside _kill_schedule_for_loop (Combat Rule 10 / D.5) when the formation crosses MatchupResolver's majority threshold (n > N/2 with n counter heroes, per Resolver Rule 6) for that enemy's archetype. Pillar 3 mechanical audibility knob — advantaged runs literally clear faster. Intentionally equal to MATCHUP_GOLD_MULTIPLIER (1.5) so Pillar 3's tempo payoff and gold payoff land on the same cadence. Tuning knob in combat_config.tres. Safe range: 1.0-2.5."
    added: 2026-04-20
    revised: ""

  - name: MATCHUP_THROUGHPUT_FACTOR_DIS
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
