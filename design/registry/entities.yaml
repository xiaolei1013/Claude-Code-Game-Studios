    notes: "Float-tolerance epsilon used by Save/Load consumers that need approximate comparison at the load boundary. Matches Godot's CMP_EPSILON / is_equal_approx default. Pass 4B-SaveLoad (2026-04-20) Rule 13: default is EXACT equality for floats that participate in boolean gates (e.g., hp_bonus_factor-vs-0.5 comparison); is_equal_approx with this epsilon is used only where the caller explicitly tolerates small drift. Denormals / NaN / Inf are authoring bugs — log + reject, do not apply epsilon. Defined as a class constant on SaveLoadSystem; consumers reference it rather than redefining locally."
