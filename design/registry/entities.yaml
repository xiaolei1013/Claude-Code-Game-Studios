      - design/gdd/enemy-database.md
      - design/gdd/dungeon-run-orchestrator.md
    value: 1.5
    unit: multiplier
    notes: "Applied to kill_bonus when formation has class-counter advantage against the killed enemy's archetype (per-kill model, locked by Matchup Resolver GDD #10 Rule 8). Pillar 3 economic hook. Tuning knob in economy_config.tres. Safe range: 1.0–2.5. Resolver outputs is_matchup_advantaged boolean; Economy applies the multiplier."
