    value: 0.2
    unit: fraction
    notes: "DEPRECATED 2026-04-20 in Pass 2B. Previously defined the soft-cliff lenience via `formation_total_hp >= (1 - SURVIVAL_MARGIN) × floor_total_enemy_attack`. Replaced by the continuous `hp_bonus_factor` formula (Combat D.6 / Rule 9) with a hard-coded LOSING trigger at `hp_bonus_factor < 0.5`. Entry retained with status=deprecated for save-data forward-compat. No new code path should read this value; combat_config.tres should omit the knob or leave it unused."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B: deprecated; replaced by continuous hp_bonus_factor formula in Combat D.6 (status: deprecated, retained for save-data forward-compat)"

  - name: LOSING_RUN_LOOT_FACTOR
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md
      - design/gdd/economy-system.md
      - docs/architecture/ADR-0002-losing-first-clear-reclaimable-on-win.md
    value: 0.5
    unit: multiplier
    notes: "Loot multiplier applied when the Orchestrator's cached losing_run flag is true (hp_bonus_factor < 0.5 at DISPATCHING, per Combat D.6 / Rule 9). SCOPE (Pass 4B-Economy A2 — Pass 2B decision 4 superseded; further refined by Pass 5A/ADR-0002): applies to KILL GOLD + FLOOR-CLEAR BONUS only. NOT applied to drip (drip is run-outcome-independent by architecture; Economy's tick_fired subscription has no coupling to Orchestrator's losing_run state — see Economy review log Pass 4B-Economy A2). Routed exclusively via Orchestrator: _attribute_kill_gold and _attribute_floor_clear_bonus apply the factor before calling Economy.add_gold / Economy.try_award_floor_clear. Economy does not apply the factor independently. PASS 5A / ADR-0002 — 'no fail state' reclaim: on a LOSING first-clear, the halved floor-clear bonus is credited immediately and the remaining half is reclaimable on a subsequent non-LOSING clear via Economy's monotonic-credit gate (floor_clear_bonus_credited: Dictionary[int, int]). The permanency concern from the re-review's BLOCKING-2 is resolved by the delta-credit semantic — no content is permanently destroyed by a LOSING run. Tuning knob in combat_config.tres. Safe range: 0.5-0.95 (Pass 5B tightened lower bound from 0.0 — at 0.0 the halved floor-clear bonus is zero which, while handled defensively by try_award_floor_clear sub-AC 14-zero-bonus, violates the stated attribute_kill_gold/attribute_floor_clear_bonus output ranges (5-120 / 250-18000). For hard-content V1.0 floors, values in [0.5, 0.95] keep the penalty meaningful without collapsing the output range). Default 0.5 creates economic pressure to upgrade without ever blocking progression. Previously-listed 'drip' scope in this notes field (pre-Pass-4B-Economy) is REMOVED."
    added: 2026-04-19
    revised: "2026-04-20 Pass 5B: scope narrowed (drip removed per Pass 4B-Economy A2); reclaim semantic added per ADR-0002; safe range lower bound tightened 0.0 -> 0.5; referenced_by extended with economy-system.md + ADR-0002."

  - name: MATCHUP_THROUGHPUT_FACTOR_ADV
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
