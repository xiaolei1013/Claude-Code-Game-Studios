# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: drip_per_tick
    status: active
    source: design/gdd/economy-system.md
    referenced_by:
      - design/gdd/economy-system.md
    variables:
      - BASE_DRIP[floor_tier]
      - formation_strength_factor
      - matchup_drip_factor
    output_range: [2, 60]
    expression: "floor(BASE_DRIP[floor_tier] * formation_strength_factor * matchup_drip_factor)"
    notes: "formation_strength_factor = clamp(1.0 + (avg_formation_level - 1) * 0.2, 1.0, 3.0) — see formation_strength_factor formula entry (owned by hero-roster.md) for full variable definitions. matchup_drip_factor defaults to 1.0; MATCHUP_DRIP_BONUS tuning knob enables a boost. Read by Dungeon Run Orchestrator and Offline Progression Engine."
    added: 2026-04-18
    revised: ""

  - name: kill_bonus
    status: deprecated
    source: design/gdd/economy-system.md
    referenced_by:
      - design/gdd/economy-system.md
      - design/gdd/enemy-database.md  # reference-only per Pass 4B-Economy A4
    variables:
      - BASE_KILL[enemy_tier]
      - matchup_multiplier
    output_range: [5, 120]
    expression: "DEPRECATED — see attribute_kill_gold (Orchestrator is the canonical gold-attribution call-site per Pass 4B-Economy A4 2026-04-20)"
    notes: "DEPRECATED 2026-04-20 (Pass 4B-Economy A4): Economy's `kill_bonus` formula is superseded by Orchestrator's `attribute_kill_gold(tier, advantaged, losing_run)` to eliminate the formula-duplication range conflict. Orchestrator owns losing_run state + applies LOSING_RUN_LOOT_FACTOR before calling Economy.add_gold. Original range [15, 120] assumed `BASE_KILL[1]=15` (also stale — Pass 4B-Economy A3 reconciled to 10) and did not account for the LOSING floor. Kept in the registry for historical trace; DO NOT use as an authoritative source."
    added: 2026-04-18
    revised: 2026-04-20

  - name: recruit_cost
    status: active
    source: design/gdd/economy-system.md
    referenced_by:
      - design/gdd/economy-system.md
    variables:
      - BASE_RECRUIT[class_tier]
      - RECRUIT_RATIO
      - copies_owned
    output_range: [150, 25920]
    expression: "floor(BASE_RECRUIT[class_tier] * RECRUIT_RATIO ^ copies_owned)"
    notes: "BASE_RECRUIT[tier_1]=150, BASE_RECRUIT[tier_2]=8000. RECRUIT_RATIO=1.8. copies_owned=0 for first purchase. Output range shown is the practical V1.0 3-copy window (150 to 25920); theoretical ceiling under MAX_ROSTER_SIZE=30 reaches ~2.55B gold for a 30th tier-1 copy. Read by Recruitment System."
    added: 2026-04-18
    revised: 2026-04-18

  - name: level_cost
    status: active
    source: design/gdd/economy-system.md
    referenced_by:
      - design/gdd/economy-system.md
    variables:
      - BASE_LEVEL[class_tier]
      - LEVEL_RATIO
      - current_level
    output_range: [40, 270213]
    expression: "floor(BASE_LEVEL[class_tier] * LEVEL_RATIO ^ (current_level - 1))"
    notes: "BASE_LEVEL[tier_1]=40, BASE_LEVEL[tier_2]=600. LEVEL_RATIO=1.6. current_level is hero level before upgrade (1-indexed). LEVEL_CAP=15. Read by Hero Leveling System."
    added: 2026-04-18
    revised: ""

  - name: offline_elapsed_seconds
    status: active
    source: design/gdd/game-time-and-tick.md
    referenced_by:
      - design/gdd/game-time-and-tick.md
    variables:
      - t_current
      - t_last_persist
      - offline_cap_seconds
      - REWIND_TOLERANCE_SECONDS
    output_range: [0.0, 28800.0]
    expression: "clamp(t_current - t_last_persist, 0, offline_cap_seconds); if delta < -REWIND_TOLERANCE_SECONDS then 0"
    notes: "One-shot calculation at session launch. Output fed to Offline Progression Engine. Cap is a tuning knob (default 28800 = 8h)."
    added: 2026-04-18
    revised: ""

  - name: offline_tick_budget
    status: active
    source: design/gdd/game-time-and-tick.md
    referenced_by:
      - design/gdd/game-time-and-tick.md
    variables:
      - elapsed_offline_seconds
      - TICKS_PER_SECOND
    output_range: [0, 576000]
    expression: "floor(elapsed_offline_seconds * TICKS_PER_SECOND)"
    notes: "Integer tick count fed to Offline Progression Engine. Max at default cap: 576000 ticks. Offline Engine must batch-replay this within ~500ms or chunk across frames."
    added: 2026-04-18
    revised: ""

  - name: is_class_counter
    status: active
    source: design/gdd/hero-class-database.md
    referenced_by:
      - design/gdd/hero-class-database.md
      - design/gdd/class-vs-enemy-matchup-resolver.md
    variables:
      - class_data
      - enemy_archetype
    output_range: [false, true]
    expression: "class_data.counter_archetype == enemy_archetype"
    notes: "Single string-equality check. Declared in Hero Class DB D.2; implemented by MatchupResolver._is_class_counter. Formation-level aggregation (majority threshold n > N/2 over heroes; for MVP FORMATION_SIZE=3 this means n>=2) lives in MatchupResolver Rule 6 + D.2. Threshold revised from boolean OR on 2026-04-19. If Class DB ever changes the counter check logic, MatchupResolver must change in lockstep."
    added: 2026-04-19
    revised: ""

  - name: formation_strength_factor
    status: active
    source: design/gdd/hero-roster.md
    referenced_by:
      - design/gdd/hero-roster.md
      - design/gdd/economy-system.md
    variables:
      - avg_formation_level
      - LEVEL_CAP
    output_range: [1.0, 3.0]
    expression: "clamp(1.0 + (avg_formation_level - 1) * 0.2, 1.0, 3.0); empty formation returns 1.0 directly via guard clause"
    notes: "Computed by HeroRoster.get_formation_strength(). Consumed by Economy's drip_per_tick formula. avg_formation_level is the arithmetic mean of current_level across heroes in active formation slots (skips empty slots). Clamp ceiling reached at avg_formation_level == 11."
    added: 2026-04-19
    revised: ""

  - name: formation_dps_per_tick
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/class-vs-enemy-matchup-resolver.md  # Pass 2B: Combat calls Resolver per-enemy to scale this raw rate
      - design/gdd/dungeon-run-orchestrator.md         # cached on RunSnapshot at DISPATCHING per Orchestrator C.2
    variables:
      - hero.attack
      - hero.speed
      - SPEED_BASE
    output_range: [0.0, 2.31]
    expression: "sum(hero.attack * hero.speed for hero in formation) / SPEED_BASE; empty formation returns 0.0 via guard clause"
    notes: "RAW throughput formula for Combat Resolution (Pass 2B: raw, not effective). Per-hero contribution = hero.attack * hero.speed / SPEED_BASE makes Rogue's high-speed identity mechanically distinct (Pillar 2). Effective per-enemy throughput = this × matchup_throughput_factor (MATCHUP_THROUGHPUT_FACTOR_ADV=1.5 or MATCHUP_THROUGHPUT_FACTOR_DIS=1.0) applied inside _kill_schedule_for_loop (Combat D.5 / Rule 10) — Pillar 3 mechanical payoff. Consumed by ticks_per_loop and _kill_schedule_for_loop. SPEED_BASE = 2400 default; tuning knob 800-6000. MVP upper bound 2.31 = 3× Rogue L15 (5544/2400) raw; advantaged effective upper bound 3.465 (2.31×1.5) against matched enemies; practical peak 1.723 raw (L15 W+M+R = 4136/2400); typical play band 0.207 raw (L1 W+M+R) through 1.417 raw (L13 W+M+R)."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B: clarified as RAW (per-enemy matchup factor applied downstream); referenced_by extended to Resolver. 2026-04-19 Pass 1: upper bound corrected 5.0 → 2.31 (3× Rogue L15 theoretical MVP max)."

  - name: ticks_per_loop
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/class-vs-enemy-matchup-resolver.md  # Pass 2B: Resolver consumed per-enemy inside the kill-schedule that derives this
      - design/gdd/dungeon-run-orchestrator.md         # cached on RunSnapshot at DISPATCHING per Orchestrator C.2
    variables:
      - formation_dps_per_tick  # raw
      - enemy.base_hp  # per-enemy
      - matchup_throughput_factor  # per-enemy (MATCHUP_THROUGHPUT_FACTOR_ADV or _DIS)
    output_range: [1, 28800]
    expression: "_kill_schedule_for_loop(formation, floor).back().kill_tick; where the schedule accumulates kill_tick += ceili(enemy.base_hp / (formation_dps_per_tick × matchup_throughput_factor(enemy.archetype))) per enemy in expanded floor.enemy_list order (Combat Rule 10 / D.5)"
    notes: "Loop cadence under continuous-respawn model (Combat Rule 7-8). Last entry of _kill_schedule_for_loop EQUALS this value (Pass 2B: derived, not independently computed). Pre-Pass-2B closed form `ceili(floor_total_hp / formation_dps_per_tick)` is retained only as the D.7 pacing-table cumulative-HP approximation (within ~1% of per-enemy canonical under neutral matchup). Bounded ≥1 via per-enemy ceili. Practical max under default SPEED_BASE: ~10629 ticks (L1 W+M+R on F5, neutral matchup). Uses GDScript 4.6 `ceili` (int-returning), NOT `ceil` (float-returning) — Combat D-header convention."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B: expression rewritten for per-enemy matchup routing; referenced_by extended. 2026-04-19 Pass 2A: ceil → ceili (GDScript 4.6 int-returning variant per Combat D-header convention)"

  - name: floor_total_hp
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/biome-dungeon-database.md
      - design/gdd/dungeon-run-orchestrator.md  # informational read for snapshot diagnostics
    variables:
      - enemy.base_hp
      - count
    output_range: [216, 4818]
    expression: "sum(enemy.base_hp * count for enemy in floor.enemy_list)"
    notes: "Per-floor static value derived from Biome DB enemy_list. MVP values: F1=216, F2=308, F3=985, F4=2040, F5=4818 (Pass 2B: F5 raised from 2200 to hit 170 s clear-time target under SPEED_BASE=2400, L13 W+M+R neutral matchup). Re-validates against entity registry on Enemy DB updates."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B: upper bound 2200 → 4818 (F5 boss HP cascade, locked decision 3)"

  - name: formation_total_hp
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md  # transitive via hp_bonus_factor cached on RunSnapshot
    variables:
      - hero.hp (via stat_at_level)
    output_range: [55, 1074]
    expression: "sum(stat_at_level('hp', hero.class_data, hero.current_level) for hero in formation)"
    notes: "Used by soft survivability check (D.6). Practical formations: solo L1 Rogue = 55 (min, 1-hero slot); L1 W+M+R = 245; L13 W+M+R = 665 (324+190+151); L15 W+M+R = 735 (mixed max); 3× Warrior L15 = 1074 (theoretical max, single-class tank stack). Single-hero range: L1 Rogue 55 → L15 Warrior 358."
    added: 2026-04-19
    revised: "2026-04-19 Pass 1: upper bound corrected 735 → 1074 (3× Warrior L15); L13 sum corrected 635 → 665."

  - name: floor_total_enemy_attack
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md  # transitive via hp_bonus_factor cached on RunSnapshot
    variables:
      - enemy.base_attack
      - count
    output_range: [35, 96]
    expression: "sum(enemy.base_attack * count for enemy in floor.enemy_list)"
    notes: "Used by soft survivability check (D.6). MVP values: F1=35, F2=53, F3=86, F4=96, F5=45. Note F5 (single boss) is lower than F4 (3 elites) — expected per Enemy DB calibration."
    added: 2026-04-19
    revised: ""

  - name: survived
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md  # cached as RunSnapshot.losing_run = !survived; gates LOSING_RUN_LOOT_FACTOR application per Orchestrator C.5/D.1
    variables:
      - hp_bonus_factor  # per Pass 2B; derived from formation_total_hp + floor_total_enemy_attack per hp_bonus_factor formula entry
    output_range: [false, true]
    expression: "hp_bonus_factor >= 0.5"
    notes: "Pass 2B: redefined as the LOSING-run trigger derived from the continuous hp_bonus_factor (Combat Rule 9 / D.6). `survived = true` means LOSING_RUN_LOOT_FACTOR is NOT applied; `survived = false` (i.e., hp_bonus_factor < 0.5) triggers halving on all run gold including first-clear bonus (per locked Pass 2B decision 4 + Economy C.2.3). In MVP floors (F1-F5, enemy attack 35-96), `survived=false` is near-unreachable (lowest natural formation is L1 solo Rogue 55; on F4 attack 96: 55/96=0.573 → survived=true). Heroes never die during a run; this is a run-level economic signal only. Cleric V1.0 plugs in upstream by raising formation_total_hp via synergy multiplier."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B: redefined as hp_bonus_factor >= 0.5 (continuous Pillar 2). Old expression (formation_total_hp >= (1-SURVIVAL_MARGIN)*floor_total_enemy_attack) retired."

  - name: hp_bonus_factor
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md  # cached on RunSnapshot at DISPATCHING; derives losing_run gate per Orchestrator C.2
    variables:
      - formation_total_hp
      - floor_total_enemy_attack
    output_range: [0.0, 1.0]
    expression: "mini(formation_total_hp / floor_total_enemy_attack, 1.0); 0.0 when floor_total_enemy_attack == 0 (divide-by-zero pre-guard per Combat E.3)"
    notes: "Pillar 2 continuous throughput multiplier (Combat Rule 9 / D.6) applied inside _kill_schedule_for_loop alongside matchup_throughput_factor: effective_dps = formation_dps_per_tick × matchup_throughput_factor × hp_bonus_factor. Saturation at 1.0 means adequately-resourced formations carry no tempo penalty. Factor drops toward 0 when formation is severely under-HP vs the floor's aggregate enemy attack. MVP floors (F1-F5, enemy attack 35-96) almost always saturate; Warrior HP investment is economy-neutral in MVP and pays off on V1.0 hard content. hp_bonus_factor < 0.5 additionally triggers LOSING_RUN_LOOT_FACTOR via the `survived` field (see survived formula). Introduced 2026-04-20 Pass 2B to replace the boolean SURVIVAL_MARGIN cliff with a continuous curve (Pillar 1 posture strengthened)."
    added: 2026-04-20
    revised: ""

  - name: action_cooldown_ticks
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
    variables:
      - combatant.speed
      - SPEED_BASE
    output_range: [1, 6000]
    expression: "if combatant.speed <= 0: return 1; else: return maxi(1, floori(SPEED_BASE / combatant.speed))"
    notes: "Conceptual per-combatant cooldown. NOT directly invoked in the closed-form throughput path (D.2 formation_dps_per_tick collapses cooldowns into a rate). Surfaced for legibility of speed semantics and as a defensive guard. Pre-guard `speed <= 0 → return 1` is mandatory and MUST run before the division (GDScript int division traps on zero divisor). The `maxi(1, ...)` clamp is belt-and-suspenders for the case `speed > SPEED_BASE` (floored division yields 0 → clamped to 1). Uses GDScript 4.6 `maxi`/`floori` (int-returning), NOT `max`/`floor` (float-returning) — Combat D-header convention. Resolves Class DB GDD #5 Open Question 4."
    added: 2026-04-19
    revised: "2026-04-19 Pass 2A: max/floor → maxi/floori; explicit speed<=0 pre-guard added per Combat D.1"

  - name: attribute_kill_gold
    status: active
    source: design/gdd/dungeon-run-orchestrator.md
    referenced_by:
      - design/gdd/dungeon-run-orchestrator.md
      - design/gdd/economy-system.md  # consumes the output via add_gold
    variables:
      - tier
      - advantaged
      - losing_run
      - BASE_KILL[tier]
      - MATCHUP_GOLD_MULTIPLIER
      - LOSING_RUN_LOOT_FACTOR
    output_range: [5, 120]
    expression: "floori(BASE_KILL[tier] × matchup_multiplier × loot_factor); matchup_multiplier = MATCHUP_GOLD_MULTIPLIER if advantaged else 1.0; loot_factor = LOSING_RUN_LOOT_FACTOR if losing_run else 1.0"
    notes: "Orchestrator's per-kill gold attribution formula (Orchestrator D.1). Bridges Combat's KillEvent stream to Economy's add_gold() entry point. Identical implementation in foreground (per-event) and offline (per-archetype × loops aggregated). Lower bound 5 = tier-1 kill, neutral, losing → floori(10 × 1.0 × 0.5). Upper bound 120 = tier-3 kill, advantaged, non-losing → floori(80 × 1.5 × 1.0). Pillar 3 audibility AND Pillar 1 LOSING-run-loot integration both flow through this single formula."
    added: 2026-04-20
    revised: ""

  - name: attribute_floor_clear_bonus
    status: active
    source: design/gdd/dungeon-run-orchestrator.md
    referenced_by:
      - design/gdd/dungeon-run-orchestrator.md
      - design/gdd/economy-system.md  # consumes the output via try_award_floor_clear
    variables:
      - floor_index
      - losing_run
      - FLOOR_CLEAR_BONUS[floor_index]
      - LOSING_RUN_LOOT_FACTOR
    output_range: [250, 18000]
    expression: "floori(FLOOR_CLEAR_BONUS[floor_index] × loot_factor); loot_factor = LOSING_RUN_LOOT_FACTOR if losing_run else 1.0"
    notes: "Orchestrator's first-clear bonus formula (Orchestrator D.2). Per Combat Rule 9 + Pass 2B locked decision 4: first-clear bonus IS halved on LOSING runs (not exempt). Lower bound 250 = F1 first-clear under LOSING → floori(500 × 0.5). Upper bound 18000 = F5 first-clear non-losing. Called by Orchestrator's try_award_floor_clear path (C.6 idempotency layer 2) — Economy's per-lifetime gate (Economy AC H-03, layer 3) is authoritative for actual payment. **Pass 4A indexing lock**: FLOOR_CLEAR_BONUS is **1-based** — FLOOR_CLEAR_BONUS[1]=F1, [2]=F2, [3]=F3, [4]=F4, [5]=F5. FLOOR_CLEAR_BONUS[0] is undefined (sentinel — access is a bug; Orchestrator guards with assert(floor_index >= 1 and floor_index <= 5)). Rationale: floor_index is 1-based throughout (F1–F5); matching [floor_index] directly avoids the [floor_index - 1] off-by-one footgun."
    added: 2026-04-20
    revised: 2026-04-20

