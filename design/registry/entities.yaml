  - name: SPEED_BASE
    status: active
    source: design/gdd/combat-resolution.md
    referenced_by:
      - design/gdd/combat-resolution.md
    value: 2400
    unit: ticks
    notes: "Single-knob recalibration of all combat throughput. Cooldown divisor (action_cooldown_ticks = maxi(1, floori(SPEED_BASE / speed))) AND DPS denominator (formation_dps_per_tick = sum(attack × speed) / SPEED_BASE). Tuning knob in combat_config.tres. Safe range: 800-6000. Default 2400 hits Biome targets across F1–F5 within ±~5% under Pass 2B calibration: F1=41s, F2=46s, F3=85s, F4=90s, F5=170s. Pass 2B (2026-04-20) closed two prior calibration items: F3 Biome target revised 60s → 85s (Combat I.Q1 CLOSED), and F5 boss HP raised 2200 → 4818 to lock 170s clear at L13 W+M+R neutral matchup via the closed-form ceili(170 × 20 × 1.417) = 4818 (Combat I.Q2 CLOSED). See Combat G.2 calibration table for the full SPEED_BASE × floor matrix."
    added: 2026-04-19
    revised: "2026-04-20 Pass 2B/Pass 3 reflexion: notes refreshed to reflect closure of Combat I.Q1 (F3 60→85s) and I.Q2 (F5 boss HP 2200→4818); maxi/floori notation aligned with Combat D-header convention; stale ~4900 estimate removed."

  - name: SURVIVAL_MARGIN
    status: deprecated
    source: design/gdd/combat-resolution.md
    referenced_by:
