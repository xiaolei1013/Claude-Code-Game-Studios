  - contract: orchestrator_di_pattern
    status: active
    pattern: direct_call               # two public setters on autoload Node; lazy-default _ready() completes wiring
    producer: DungeonRunOrchestrator   # rank 14 (autoload Node)
    consumers:
      - boot                           # production: Orchestrator's _ready() null-checks fields, lazy-constructs DefaultCombatResolver.new() + DefaultMatchupResolver.new()
      - tests                          # test: construct Orchestrator via .new(), pre-inject via set_combat_resolver(spy) + set_matchup_resolver(spy), then add_child(orch) or call _ready() directly — null-checks short-circuit; spies preserved
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    signature: |
      var _combat_resolver: CombatResolver = null
      var _matchup_resolver: MatchupResolver = null

      func _init() -> void:
          pass   # zero-arg per autoload.md Claim 4 [VERIFIED]; DI does not happen here

      func _ready() -> void:
          if _combat_resolver == null:
              _combat_resolver = DefaultCombatResolver.new()   # fails closed — production always has defaults
          if _matchup_resolver == null:
              _matchup_resolver = DefaultMatchupResolver.new()

      func set_matchup_resolver(resolver: MatchupResolver) -> void:   # test-facing setter
          assert(resolver != null)
          _matchup_resolver = resolver

      func set_combat_resolver(resolver: CombatResolver) -> void:     # test-facing setter
          assert(resolver != null)
          _combat_resolver = resolver
    notes: "Codifies `design/gdd/dungeon-run-orchestrator.md` §J.1 Option A (locked Pass 5C+, 2026-04-20+). Production 'fails closed' — a ship build where a programmer forgot to call any DI method still boots playable with defaults. Tests pre-inject spies via the setters BEFORE `add_child(orch)` fires `_ready()`; the null-checks short-circuit and spies are preserved. Rejects the equivalent of `wire_dependencies` (§J.7 Option E rejection — fails open, not closed). Addresses the engine constraint that Godot's autoload system calls `_init()` with zero args (autoload.md Claim 4 [VERIFIED]). Project-wide pattern for all autoload-level DI: future autoloads adopt the same zero-arg `_init` + lazy-default `_ready` + test-facing `set_*` public setters."
    referenced_by:
      - docs/architecture/ADR-0003-autoload-rank-table-canonical.md   # Amendment #3
      - docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
      - docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md   # re-uses set_combat_resolver seam; does not redeclare
      - design/gdd/class-vs-enemy-matchup-resolver.md
      - design/gdd/combat-resolution.md
      - design/gdd/dungeon-run-orchestrator.md   # §J.1 is the canonical source
    added: 2026-04-22
    revised: ""

