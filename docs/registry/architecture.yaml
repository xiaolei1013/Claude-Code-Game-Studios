      - transient_runtime_only              # mid-run state lost on every app-close
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    reason: "Preserves idle-game dispatched-heroes-keep-fighting player fantasy. Orphan-hero edge case (rare: cap-trim between save+load) uses refund + `run_snapshot_discarded_orphan` signal + cozy notification. ~200 bytes persistence cost per save = negligible vs 20KB MVP budget."
    referenced_by:
      - docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md  # allowlist exception
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md       # consumer contract
      - design/gdd/dungeon-run-orchestrator.md
    added: 2026-04-22

# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: same_or_backward_rank_signal_connect_at_ready
    status: superseded_by: ADR-0003-amended-2026-04-22
    description: "[SUPERSEDED — incorrect as written.] An autoload at rank N MUST NOT connect to a same-rank or lower-rank (M ≤ N) autoload's signal in its own `_ready()`. Use forward-only connections (M > N) or defer with `await get_tree().process_frame` if a backward connection is unavoidable."
    why_superseded: "Conflated signal subscription (rank-independent) with state reads (rank-constrained). Empirically falsified by autoload.md Claim 1 [VERIFIED] which showed rank-2 ProbeSink subscribing to rank-1 ProbeSource (M < N) works correctly. ADR-0005 OQ-6 + godot-specialist Step 4.5 confirmed the analysis. See replacement entries `same_or_backward_rank_state_read_at_ready` and `cross_rank_signal_subscription_via_await_workaround` below."
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    added: 2026-04-22
    superseded: 2026-04-22

  - pattern: same_or_backward_rank_state_read_at_ready
    status: active
    description: "At `_ready()` time, an autoload at rank N MUST NOT read state from a same-rank or higher-rank (M ≥ N) autoload that is set in that other autoload's `_ready()` body. The other autoload's `_ready()` has not yet executed when the rank-N autoload's `_ready()` runs (or runs in implementation-defined order for same-rank). Reading such state returns uninitialized/default values silently."
    why: "Rank-sequential `_ready()` invocation means lower-rank autoloads' `_ready()` bodies have completed when higher-rank `_ready()` runs — so state set in lower-rank `_ready()` is visible to higher-rank readers. The reverse is not true. Same-rank `_ready()` order is implementation-defined per Godot 4.6 autoload semantics. SIGNAL SUBSCRIPTION is exempt — signal objects exist on Node instantiation, before any `_ready()` fires (autoload.md Claim 1 [VERIFIED] sub-claim a)."
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    added: 2026-04-22

  - pattern: signal_emission_consumer_ordering_assumption
    status: active
    description: "Code that `signal.emit()`s a tick or event signal MUST NOT assume any specific consumer-invocation order beyond what is guaranteed by the consumers' connection order. Connection order coincides with autoload `_ready()` invocation order (rank-sequential) BY CONVENTION ONLY — a future rank reassignment touching consumers of the same signal could silently invert their processing order."
    why: "Godot 4.x signal emission invokes connected callables in connection order. Multiple consumers connecting to the same signal at `_ready()` time will fire in rank order. If the system relies on consumer A processing before consumer B (e.g., Economy.update before DungeonRunOrchestrator.compute), that ordering is preserved only if Economy's rank < Orchestrator's rank. Reordering the rank table without auditing signal-consumer ordering can silently break the contract. (godot-specialist Step 4.5 Note 3 on ADR-0005)"
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "Rank reassignment protocol in ADR-0003 §Editing protocol must include a code-review checklist item: audit all signals emitted by autoloads in the affected rank range; verify consumer-ordering invariants are preserved post-reassignment."
    added: 2026-04-22

  - pattern: cached_consumer_node_reference_at_save_load_boundary
    status: active
    description: "SaveLoadSystem MUST NOT cache consumer autoload references in instance vars (e.g., `var _economy: Economy = Economy` at `_ready` time). Re-resolve via `get_node_or_null(path)` at every serialization boundary."
    why: "Hot-reload in dev builds (and EditorPlugin.reload_scripts() in tooling) swaps the underlying autoload Node instance under the same path. Cached references become dangling after the cycle. Per-call resolution always returns the current instance and is sub-microsecond cost relative to the dominant HMAC+JSON phase."
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    added: 2026-04-22

  - pattern: runtime_consumer_self_registration_via_groups
    status: active
    description: "Save consumer enumeration MUST be hardcoded in `SaveLoadSystem.CONSUMER_PATHS`. Consumers MUST NOT self-register via `add_to_group(\"save_consumer\")` or any runtime registration mechanism. SaveLoadSystem MUST NOT iterate `get_tree().get_nodes_in_group(...)` to discover consumers."
    why: "SceneTree group iteration order is implementation-defined; non-stable order corrupts persisted dict key ordering across runs (noisy save diffs, broken assumptions about iteration). No build-time error if a consumer forgets to register. Save migration becomes harder because the consumer set is not enumerable from source. ADR-0003 Alternative 2 rejected this approach with these reasons."
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    added: 2026-04-22

  - pattern: consumer_access_to_save_meta_namespace
    status: active
    description: "Consumers MUST NOT read or write any field under the save payload's top-level `_meta` key. The top-level dict has two disjoint key classes: (a) consumer-namespace keys (one per CONSUMER_PATHS entry, snake-cased basename) and (b) `_meta` (owned exclusively by SaveLoadSystem). Any consumer's `get_save_data()` that returns a dict containing a `_meta` key, or any consumer's `load_save_data(data)` that reads `data._meta`, is a regression."
    why: "`_meta` carries security and verification fields owned by SaveLoadSystem (slot_index, save_sequence_number, tamper_suspicious_count, backup_restore_events). Consumer access would create cross-system coupling that breaks SaveLoadSystem's anti-tamper invariants and the V1.0 cloud-sync conflict resolution path."
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    added: 2026-04-22

  - pattern: hmac_or_secret_suggestive_identifiers
    status: active
    description: "In SaveLoadSystem and any autoload holding HMAC key fragments, identifiers MUST NOT contain the substrings `key`, `secret`, or `hmac`. This includes variable names, constant names, function names, type names, comment labels, and log/error message strings. Acceptable example: `_GAME_NAMESPACE_BYTES`, `_DERIVE_BYTE_FRAGMENT_C`. Forbidden example: `_HMAC_SECRET`, `_SAVE_KEY_PART_A`."
    why: "Decompiler attackers (e.g., `gdsdecomp`) locate labeled constants in seconds. The multi-part assembly pattern's marginal value over a single hardcoded constant comes from forcing the attacker to find and combine 3-4 unlabeled fragments. A single suggestive identifier collapses the abstraction. Threat model is casual-deterrent — this is a meaningful raise against script-kiddie tooling, not against determined reverse engineers."
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    enforcement: "/security-audit static-grep scan before MVP ship; CI lint rule once /architecture-review matures."
    added: 2026-04-22

  - pattern: static_secret_in_hmac_keying
    status: active
    description: "The 16-byte XOR-mask `STATIC_SECRET` MUST NOT participate in HMAC key derivation. The XOR mask seed (`SHA256(MAGIC || VERSION || STATIC_SECRET)`) and the HMAC key derivation (`SHA256(PART_A XOR PART_B || PART_C || build_version_string)`) operate on disjoint byte sources. Any implementation that mixes STATIC_SECRET into the HMAC key path is a regression against the architectural separation of obfuscation salt vs integrity keying boundaries."
    why: "Confidentiality (XOR obfuscation) and integrity (HMAC) are independent security concerns. STATIC_SECRET is a namespace salt — its purpose is to ensure the XOR mask differs across products built on the same engine conventions. Using it as HMAC key material would couple the two boundaries: a STATIC_SECRET leak (trivial via decompilation) would weaken HMAC keying that should rotate per build version. Per Save/Load GDD security-engineer F2 contract."
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    added: 2026-04-22

  - pattern: process_delta_as_economy_input
    status: active
    description: "Any `_process(delta)` read where the resulting value feeds loot calculation, currency math, run-outcome math, or any other economy-relevant computation is FORBIDDEN. `_process(delta)` is permitted only for rendering, animation interpolation, and the TickSystem's accumulator (which itself does NOT vend delta to anyone — it produces tick events). Frame-rate variance corrupts delta; resume-after-pause produces a single huge delta that would silently award massive offline gains."
    why: "Pillar 1 (Respect the Player's Time) requires economy fairness across frame rate, frame drops, and resume-after-pause. The dual-clock architecture (ADR-0005) exists precisely to ensure economy math reads ticks (deterministic, frame-rate-independent) rather than delta (non-deterministic). A single _process(delta) → economy math regression silently breaks Pillar 1."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "/architecture-review static-grep for `_process(delta)` callers that feed Economy, DungeonRunOrchestrator, OfflineProgressionEngine, or any consumer of TickSystem signals; flag as ERROR (not warning)."
    added: 2026-04-22

  - pattern: deferred_tick_emission
    status: active
    description: "TickSystem MUST emit `tick_fired` synchronously inside `_process`. The following patterns are FORBIDDEN: `tick_fired.emit.call_deferred(n)`, `call_deferred(\"emit_signal\", \"tick_fired\", n)`, scheduling tick_fired emission via Timer node callback, or any other mechanism that delays signal delivery beyond the originating frame."
    why: "Consumer ordering depends on synchronous delivery. Economy (rank 3) → DungeonRunOrchestrator (rank 14) → DungeonRunView (presentation) must process within the same _process invocation that incremented the tick counter. Deferred emission breaks the within-tick ordering guarantee and degrades offline-replay determinism (offline replay invokes batch APIs, not the signal — so the signal path's behavior is foreground-only and ordering matters)."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "/architecture-review static-grep for `tick_fired.emit.call_deferred` and `call_deferred(\"emit_signal\", \"tick_fired\", ...)` anywhere in the project."
    added: 2026-04-22

  - pattern: tick_fired_during_offline_replay
    status: active
    description: "OfflineProgressionEngine MUST invoke `consumer.compute_offline_batch(tick_count)` directly during offline replay. Re-emitting `tick_fired(n)` during the offline replay loop is FORBIDDEN. The signal path is foreground-only by contract."
    why: "Performance: AC-TICK-10 BLOCKING budget is 500ms for 576,000 ticks on min-spec mobile. Signal emission overhead per tick (callable dispatch + ordering guarantees) is incompatible with that budget. Direct batch-API invocation bypasses the signal layer and lets consumers process the tick budget in tight loops. Also — re-emitting tick_fired during offline replay would falsely trigger any FOREGROUND-only consumers that expect ticks only during normal play."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "OfflineProgressionEngine implementation MUST NOT emit tick_fired in any code path; verified by code review and AC-TICK-08."
    added: 2026-04-22

  - pattern: discarding_accumulator_residual_on_pause
    status: active
    description: "TickSystem's `_tick_accumulator_seconds` MUST retain its residual value when entering a pause state (BACKGROUNDED, UI-paused) and resume from that value on unpause. Resetting the accumulator to 0 on pause entry is FORBIDDEN."
    why: "Discarding the residual introduces a silent ≤50ms tick-phase shift per pause cycle. Across many BG↔FG cycles (Steam Deck sleep/wake, mobile alt-tab patterns), this drift compounds. Offline-replay determinism assumes the in-session tick budget reflects exact wall-clock-to-tick conversion; phase shifts break that assumption. Verified by AC-TICK-04 (Foreground/Background State Transition)."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    added: 2026-04-22

  - pattern: wall_clock_read_outside_tick_system
    status: active
    description: "The function `Time.get_unix_time_from_system()` MUST be called from exactly ONE call site project-wide: TickSystem's Wall Clock read path. All other systems MUST read TickSystem's vended int64 value via `now_ms()`, `get_last_persist_ts()`, `get_session_high_water()`, or the `offline_elapsed_seconds(secs, cap_reached)` one-shot signal."
    why: "Eliminates float-rounding scatter across the codebase. A single call site means a single int64 cast point; no system can introduce subtle precision bugs by independently calling the float-returning OS API. Also enables the debug-only mock-clock test surface (debug_set_unix_time) to be authoritative — multiple call sites would each need their own mock injection."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "/architecture-review static-grep for `Time.get_unix_time_from_system()` anywhere outside TickSystem; flag as ERROR. Single-call-site rule documented in coding-standards.md alongside cross-autoload reference patterns."
    added: 2026-04-22

  - pattern: third_party_writes_to_time_system_state
    status: active
    description: "Only SaveLoadSystem may invoke `TickSystem.set_last_persist_ts(ts)` and `TickSystem.set_session_high_water(ts)`. All other systems are read-only consumers of these timestamps. Economy, DungeonRunOrchestrator, HeroRoster, FormationAssignment, and any future autoload MUST NOT call the setter methods."
    why: "Timestamp integrity. The bidirectional Save/Load contract (read at persist, write at load) is the sole legitimate write path. A third-party write (e.g., Economy 'stamps time' on a transaction) would create unauditable timestamp mutations and break the rewind-detection invariant (Formula D.2 compares against last_persist_ts and t_session_high_water as anchors)."
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    enforcement: "Debug-build assert in setter via get_stack() caller-check (fatal push_error if caller is not SaveLoadSystem); convention enforcement via code review for release builds. Coding-standards.md adds 'Time System write-access' section."
    added: 2026-04-22

  - pattern: mutating_loaded_resource
    status: active
    description: "Consumers MUST NOT write to `@export` fields on a Resource returned by DataRegistry.get_all_by_type() or DataRegistry.resolve(). Godot's resource cache returns the same object instance for repeated load() calls on the same path; a mutation corrupts every other system holding a reference to the same cached resource."
    why: "Read-only contract is foundational to the Data Loading System. AC-DLS-08 fires in test builds to detect mutations. Production builds do not enforce programmatically (defensive .duplicate() on every accessor return would explode memory and defeat the cache). If a consumer needs a mutable working copy, it MUST explicitly call template.duplicate() (shallow) or template.duplicate_deep() (Godot 4.5+ — for inline nested resources). HeroRoster (rank 7) is the canonical owner of 'instances built from templates'."
    adr: docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md
    enforcement: "AC-DLS-08 in test builds; coding-standards.md 'Resource immutability' section; code review checklist item. Caveat per godot-specialist Step 4.5 Note 2: duplicate_deep() does NOT cross ExtResource boundaries — cross-file references remain shared."
    added: 2026-04-22

  - pattern: defensive_duplicate_on_resource_read
    status: active
    description: "DataRegistry MUST NOT call `.duplicate()` or `.duplicate_deep()` on Resources returned by accessors. The accessor returns the cached instance directly; consumer must explicitly duplicate if mutation is needed."
    why: "Defensive duplication on every read defeats Godot's resource cache (the optimization that makes eager-load viable at MVP scale and avoids per-access I/O). Memory would scale with access count, not content count. The read-only contract is convention-enforced via mutating_loaded_resource pattern; defensive copy is the wrong solution."
    adr: docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md
    added: 2026-04-22

  - pattern: direct_data_path_load_outside_DataRegistry
    status: active
    description: "Other systems MUST NOT call `ResourceLoader.load(\"res://assets/data/...\")` directly. All content access flows through DataRegistry's accessors (`get_all_by_type`, `resolve`)."
    why: "Single-source-of-truth for the content registry. Direct ResourceLoader calls bypass the id-based stability layer (filename rename = save break), the DAG validation, the min-content-count check, and the read-only contract enforcement. Also forks the dev-only hot_reload path — a consumer with its own load() call won't pick up reloaded content."
    adr: docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md
    enforcement: "/architecture-review CI grep for `ResourceLoader.load(\"res://assets/data/...\")` outside DataRegistry; flag as ERROR."
    added: 2026-04-22

  - pattern: runtime_consumer_self_registration_in_data_categories
    status: active
    description: "Adding a new content category to DataRegistry MUST require explicit edit to `DataRegistry.ordered_categories: PackedStringArray` AND `min_content_count: Dictionary`. Auto-discovery from directory presence is FORBIDDEN — DataRegistry MUST NOT scan `assets/data/` for arbitrary subdirectories."
    why: "Typo-directories (e.g., `assets/data/classs/` instead of `classes/`) silently ship as 'the classs category exists with N entries' while the real `classes/` is empty. Consumer DBs that hardcode `get_all_by_type(\"classes\")` get an empty array with no error. Explicit registration is build-time validation that catches typos, deletions, and rename mistakes. Two-location edit burden (directory + code) is the right cost."
    adr: docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md
    added: 2026-04-22

  - pattern: production_invocation_of_hot_reload
    status: active
    description: "The `DataRegistry.hot_reload(content_type)` method MUST NEVER be referenced from production code paths — including UI affordances, gameplay state machines, save migration code, or any non-debug logic. The method body itself runtime-gates with `if not OS.is_debug_build(): return`, but invoking the call site at all in production introduces a content-injection vector."
    why: "Hot-reload's purpose is dev convenience (faster iteration without app restart). In production, it is a security risk: a future bug or attacker-controlled UI path could trigger arbitrary content reloads, potentially loading attacker-supplied .tres files or causing the in-memory index to fork from the shipped build's content. Stripping at the call-site level (CI grep) is stricter than stripping only the method body."
    adr: docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md
    enforcement: "/architecture-review CI grep for `hot_reload(` outside `if OS.is_debug_build()` guards or dedicated `_dev/` directory; flag as ERROR."
    added: 2026-04-22

  - pattern: direct_scene_tree_change_scene
    status: active
    description: "Other systems MUST NOT call `SceneTree.change_scene_to_packed()`, `SceneTree.change_scene_to_file()`, `get_tree().change_scene_to_packed()`, or any equivalent. All screen changes flow through `SceneManager.request_screen(screen_id, transition_type)`."
    why: "change_scene_to_packed destroys the entire previous scene tree, including PersistentHUDLayer, TransitionLayer, OverlayLayer — defeating the persistent-root architecture. The transition layer cannot composite stably across the swap; modal overlays cannot layer above transitions; persistent HUD elements vanish. The persistent-root pattern is the architectural choice (see api_decisions: scene_swap_strategy); change_scene_to_packed bypasses the entire mechanism."
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "/architecture-review CI grep for `change_scene_to_packed(` and `change_scene_to_file(` outside SceneManager itself (which doesn't use these either — this is a defensive grep); flag as ERROR."
    added: 2026-04-22

  - pattern: direct_screen_container_mutation
    status: active
    description: "Other systems MUST NOT call `queue_free()` on a Screen instance, `add_child()` to `ScreenContainer`, or otherwise mutate `ScreenContainer` children. All current_screen lifecycle is owned by SceneManager via `request_screen()`."
    why: "Direct mutation bypasses the lifecycle hook contract (on_exit before queue_free; deferred swap to prevent piling freed nodes). A consumer that calls queue_free on the current screen leaves SceneManager's state machine inconsistent (state == IDLE but current_screen is freed). H-02 (lifecycle hook order) BLOCKING fails."
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "/architecture-review CI grep for `ScreenContainer.add_child(` or `ScreenContainer.remove_child(` or `current_screen.queue_free(` outside SceneManager; flag as ERROR."
    added: 2026-04-22

  - pattern: direct_overlay_layer_mutation
    status: active
    description: "Other systems MUST NOT add children to `OverlayLayer` directly. Use `SceneManager.push_overlay(overlay_id, pause_on_open)` to instantiate overlays; `SceneManager.pop_overlay(overlay_id)` to dismiss."
    why: "Direct OverlayLayer mutation bypasses the modal pause coupling (counter-based get_tree().paused), the on_pause/on_resume lifecycle invocation on current_screen, and the queued-modal-during-transition handling. A bypassed overlay open during TRANSITIONING would render over a half-faded TransitionLayer (visual bug); an overlay close that bypasses the pause counter could leave the game frozen."
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "/architecture-review CI grep for `OverlayLayer.add_child(` or `OverlayLayer.remove_child(` outside SceneManager; flag as ERROR."
    added: 2026-04-22

  - pattern: bare_get_tree_paused_writes
    status: active
    description: "Other systems MUST NOT write to `get_tree().paused` directly (i.e., `get_tree().paused = true` or `get_tree().paused = false`). Only SceneManager's modal API (counter-based wrapper via push_overlay / pop_overlay) may toggle this flag."
    why: "Bare writes lose the reference-counted nesting needed for rapid overlay open/close sequences. Overlay A closes while overlay B is still open: a bare write to `false` silently unpauses the game while B is still active. The counter wrapper prevents this race by construction."
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "/architecture-review CI grep for `get_tree().paused = ` outside SceneManager's modal API; flag as ERROR. Reads (`if get_tree().paused: return`) are unrestricted — TickSystem and other PROCESS_MODE_ALWAYS nodes use this pattern legitimately per ADR-0005."
    added: 2026-04-22

  - pattern: screen_subclass_missing_lifecycle_hook
    status: active
    description: "Every `extends Screen` file MUST declare all four lifecycle hooks: `on_enter()`, `on_exit()`, `on_pause()`, `on_resume()`. Empty body is acceptable; silent omission of any hook is FORBIDDEN."
    why: "SceneManager invokes all four hooks unconditionally at the appropriate lifecycle transitions. A missing hook produces silent no-op (Godot's method-not-found becomes a base-class fallback, which is the empty `pass` in Screen base). The contract intent — 'every screen explicitly considers each lifecycle moment' — is lost. Code review burden becomes unsustainable as screen count grows."
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "/architecture-review CI grep for files containing `extends Screen` and verify all four hook signatures present; flag missing as ERROR."
    added: 2026-04-22

  - pattern: unkilled_active_transition_tween
    status: active
    description: "SceneManager MUST maintain an `_active_transition_tween: Tween` reference and call `kill()` on any valid prior reference before creating a new Tween via `create_tween()` for a new transition. Pattern: `if _active_transition_tween and _active_transition_tween.is_valid(): _active_transition_tween.kill()` at the start of `_execute_transition()`."
    why: "Implementation requirement, NOT advisory. Without this, fast back-to-back transitions where the queue overwrites mid-animation produce orphaned Tweens that continue interpolating against now-freed nodes (push_warning or harmless null-call) OR concurrently animate the same property as the new Tween (visual race). H-11 BLOCKING (no memory leaks over 10 transitions) fails. (godot-specialist Step 4.5 Note 2)"
    adr: docs/architecture/ADR-0007-scene-transition-and-persist-coupling.md
    enforcement: "Code review checklist + AC H-11 test verifies."
    added: 2026-04-22

  - pattern: hardcoded_color_in_ui_code
    status: active
    description: "UI screen code MUST NOT contain `Color(r, g, b)` literal calls or any hardcoded color reference. All colors come from the canonical Parchment theme via theme inheritance + theme_type_variation. Color constants for non-UI uses (gameplay state, debug overlays) are not affected."
    why: "Single source of truth for visual identity is the parchment_theme.tres resource. Hardcoded Color() calls fragment the Art Bible §4 palette across the codebase, making it impossible to audit color use or adjust the palette consistently. A designer changing 'Lantern Gold' in the theme would have inconsistent results if some screens hardcoded the old hex value."
    adr: docs/architecture/ADR-0008-ui-framework-dual-focus-parity-and-theme.md
    enforcement: "/architecture-review CI grep for `Color(` in src/ui/ + screen scenes; flag as ERROR. Exception: theme-author files (assets/ui/) and unit tests."
    added: 2026-04-22

  - pattern: third_font_in_ui
    status: active
    description: "Only `info_font.ttf` and `identity_font.ttf` may be committed to `assets/ui/fonts/`. A third font file is a violation of Art Bible §7 Typography Direction's two-font maximum rule."
    why: "Visual identity coherence. Two fonts encode 'this is a guild ledger written by a person': information font for body, identity font for ceremony. A third font dilutes the register. Adding a third font requires explicit Art Bible amendment + ADR supersession."
    adr: docs/architecture/ADR-0008-ui-framework-dual-focus-parity-and-theme.md
    enforcement: "/architecture-review CI grep on assets/ui/fonts/ verifies exactly two .ttf/.otf files."
    added: 2026-04-22

  - pattern: per_screen_theme_resource
    status: active
    description: "Each MVP screen MUST inherit the canonical parchment_theme.tres via MainRoot.theme cascade. Per-screen Theme resources (e.g., guild_hall_theme.tres, recruit_theme.tres) are FORBIDDEN."
    why: "Art Bible §UI Palette: 'the UI palette does not shift by biome — the interface remains consistently warm and parchment-grounded regardless of which dungeon floor is visible behind it'. Per-screen themes fragment visual identity and create palette drift risk. Use theme_type_variation for per-screen accents instead."
    adr: docs/architecture/ADR-0008-ui-framework-dual-focus-parity-and-theme.md
    enforcement: "/architecture-review CI grep for additional .tres files matching */theme.tres or *_theme.tres pattern in src/ui/ or assets/ui/themes/; flag as ERROR."
    added: 2026-04-22

  - pattern: gamepad_nav_or_focus_visual_in_mvp
    status: active
    description: "MVP implementation MUST NOT add `focus_neighbor_*` graphs, `FOCUS_ALL` overrides on Controls, or keyboard-focus visuals. The single-focus-mode strategy (FOCUS_NONE per-instance via UIFramework.suppress_keyboard_focus) is the MVP contract."
    why: "Out of scope per technical-preferences.md ('Gamepad Support: None; Keyboard: shortcuts only'). Keyboard nav requires designing focus_neighbor_* graphs per screen + dual-focus visual coordination + SceneManager focus-disable during TRANSITIONING — significant scope creep for MVP. V1.0 Accessibility GDD #30 revisits."
    adr: docs/architecture/ADR-0008-ui-framework-dual-focus-parity-and-theme.md
    enforcement: "/architecture-review CI grep for `focus_neighbor_` and `FOCUS_ALL` in screen code; flag as ERROR pre-V1.0."
    added: 2026-04-22

  - pattern: mouse_filter_stop_assumed_to_cascade
    status: active
    description: "Implementation MUST NOT assume `MOUSE_FILTER_STOP` cascades recursively to children in Godot 4.5+. Only `MOUSE_FILTER_IGNORE` cascades (per ui.md 4.5 Recursive Control behavior). STOP captures + blocks input AT ITS LEVEL only; children below the STOP filter are NOT automatically disabled."
    why: "Confusing the two values produces silent input bugs: an OverlayLayer dim Control set to STOP-and-assumed-cascading will block input at its own level (correct) but its decorative children's interactive controls (if any) would still receive events. The correct OverlayLayer pattern: STOP on the dim Control + IGNORE on its decorative children (so the child IGNORE cascades and disables that subtree). (godot-specialist Step 4.5 Note 3)"
    adr: docs/architecture/ADR-0008-ui-framework-dual-focus-parity-and-theme.md
    added: 2026-04-22

  - pattern: autoload_init_with_required_args
    status: active
    description: "Any script registered as an autoload in `project.godot` `[autoload]` MUST NOT declare `func _init(...)` with any required (un-defaulted) parameters. Godot's autoload system instantiates the script via `_create_instance` (modules/gdscript/gdscript.cpp:200) which calls `_init()` with zero arguments; a required-arg `_init` fails instantiation with `ERROR: Method expected N argument(s), but called with 0`, the autoload Node is never added to `/root`, and any systems depending on it break silently after boot. Permitted forms: no `_init` declared (implicit zero-arg); `_init()` with no parameters; `_init(a: Type = default, b: Type = default)` with ALL parameters defaulted."
    why: "Empirically verified via Pass-INIT-PROBE (2026-04-22) on Godot 4.6.1.stable.mono.official — see autoload.md Claim 4 [VERIFIED]. The claim was load-bearing for ADR-0009's DI pattern: the initial draft (and ADR-0003 Amendment #2) specified `DungeonRunOrchestrator._init(combat_resolver, matchup_resolver)` as the injection path; the probe falsified this mechanically. Pattern adopted: lazy-default with public setters (api_decisions: autoload_dependency_injection_seam) — codifies the already-locked `dungeon-run-orchestrator.md` §J.1 Option A pattern. This forbidden pattern defends the whole project against future regressions — any new autoload that adds required `_init` args silently breaks boot."
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    enforcement: "/architecture-review CI grep project-wide: for every file listed in project.godot [autoload] section, parse the file; if `^func _init\\(` is present, assert all parameters have default values. Violation blocks merge. Applies to ALL autoload scripts, not just Orchestrator."
    added: 2026-04-22

  - pattern: resolver_call_during_offline_replay
    status: active
    description: "During OfflineProgressionEngine's per-kill replay loop, `MatchupResolver.resolve_formation_matchup` / `resolve_floor_matchup` MUST NOT be called, and `DataRegistry.resolve(\"classes\", *)` MUST NOT be called. The replay loop consults the frozen snapshot via `snapshot.matched_archetypes.has(enemy.archetype)` — a pure Array lookup. Snapshot-construction calls BEFORE the replay loop are exempt (single `resolve_floor_matchup` call at dispatch time is the contract)."
    why: "AC-TICK-10 BLOCKING budget is 500ms for 576,000 ticks on min-spec mobile. Resolver calls per kill (N×DataRegistry.resolve hash lookups + N×string compare per invocation, across ~2.9M kills in the worst case) would exceed the budget by an order of magnitude. Beyond performance: the snapshot pattern is Pillar 1's fairness guarantee — offline replay reflects the rules that were active at dispatch time, not the rules live at replay time (E.10 + Rule 14). A 'convenience' refactor that adds resolver calls for 'simplicity' silently breaks both. CI-enforced via H-13 AND clause + H-17 mock-harness spy-subclass call-count assertions (both resolver call-count and DataRegistry.resolve call-count must be 0 during the replay loop)."
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    enforcement: "H-17 CI canary test (stub Offline Engine with mocked DataRegistry + spy MatchupResolver subclass; 100-kill batch; assert both call counts == 0)."
    added: 2026-04-22

  - pattern: matchup_resolver_state_or_signal_addition
    status: active
    description: "`src/gameplay/matchup/matchup_resolver.gd` MUST have zero class-scope `var` declarations outside method bodies, zero `signal` declarations, and zero `static func` public methods. Public methods MUST be regular instance `func`. Neither `MatchupResolver` nor `DefaultMatchupResolver` may appear as `[autoload]` entries in `project.godot`. `DefaultMatchupResolver` MUST `extends MatchupResolver`."
    why: "The statelessness contract (Rule 2 + Rule 12) is what makes offline replay deterministic and makes AC-ORC-11 matchup-cache correctness architecturally testable (spy subclasses override instance methods via `extends MatchupResolver`). A `var` added for 'caching' or a `signal` added for 'convenience observability' breaks the pure-function contract silently: caches introduce per-run state that must be explicitly invalidated; signals introduce emission-ordering hazards the ADR-0005 `signal_emission_consumer_ordering_assumption` pattern already documents. A `static func` re-introduces the Pass-5C-falsified unmockability gap. An autoload registration defeats the DI pattern entirely."
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    enforcement: "H-16 BLOCKING CI structural test. Grep + ConfigFile parse of project.godot. Also includes a collapsed-content regex check defending against multi-line or comment-injected declaration forms (e.g., `class_name MatchupResolver` on one line + `extends RefCounted` after blank line or comment)."
    added: 2026-04-22

  - pattern: orchestrator_setter_call_after_ready
    status: active
    description: "Unit tests MUST call `orchestrator.set_matchup_resolver(spy)` and `orchestrator.set_combat_resolver(spy)` BEFORE `_ready()` fires (i.e., before `add_child(orchestrator)` or before `orchestrator._ready()` is invoked directly). Setter calls AFTER `_ready()` has already fired are permitted but MUST be documented in the test body comment as an intentional late-override scenario — otherwise the lazy-default will have already installed production defaults and the spy overwrite may not test what the author intended."
    why: "Matches `dungeon-run-orchestrator.md` §J.3 Mode 1 canonical test pattern. The lazy-default pattern means `_ready()` installs production defaults only if the field is still null at `_ready()` time — setter calls before `_ready()` populate the field so the null-check short-circuits. Calls after `_ready()` DO still overwrite the field (the setter has no guard against this; see §J.2 late-override scenarios), but the test then has an installed-then-overwritten history that can be confusing. Convention: setters come before add_child. Intentional late-override = explicit comment."
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    enforcement: "Coding-standards.md rule + test-helper gating. A `tests/helpers/orchestrator_factory.gd` helper encapsulates the canonical sequence (new → setters → add_child) and is the preferred API. CI grep for `set_matchup_resolver` / `set_combat_resolver` calls AFTER `add_child(orch)` within the same test body — flag as WARNING. Explicit comment on the setter call permits the pattern."
    added: 2026-04-22

  - pattern: combat_resolver_state_or_signal_addition
    status: active
    description: "`src/gameplay/combat/combat_resolver.gd` MUST have zero class-scope `var` declarations outside method bodies, zero `signal` declarations, and zero public `static func` methods. Public methods MUST be regular instance `func`. Neither `CombatResolver` nor `DefaultCombatResolver` may appear as `[autoload]` entries in `project.godot`. `DefaultCombatResolver` MUST `extends CombatResolver`. The static `dict_equals` helper lives on `combat_batch_result.gd` (a value type), NOT on `CombatResolver` — `combat_resolver.gd` itself is free of public static functions."
    why: "Combat Rule 1 (statelessness) is what makes foreground/offline parity deterministic and makes AC-COMBAT-01 / AC-COMBAT-10 / AC-COMBAT-17 architecturally testable (spy subclasses override instance methods via `extends CombatResolver`). A `var` added for 'caching the last kill schedule' or a `signal` added for 'kill_emitted observability' breaks the pure-function contract silently: caches introduce per-run state that must be explicitly invalidated; signals introduce emission-ordering hazards the ADR-0005 `signal_emission_consumer_ordering_assumption` pattern already documents. A `static func` re-introduces the Pass-3D-falsified unmockability gap (GdUnit4 cannot mock static methods — AC-ORC-03 / AC-ORC-05 / AC-COMBAT-01 become architecturally unwritable). An autoload registration defeats the DI pattern entirely (rank 9 is deliberately vacant per ADR-0003 Amendment #2). This is the structural mirror of `matchup_resolver_state_or_signal_addition` (ADR-0009) for the Combat side."
    adr: docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md
    enforcement: "H-COMBAT structural CI test at `tests/ci/combat_structural_test.gd`. Grep for class-scope `var ` (collapsed content, ignoring method bodies), `signal `, and `^static func ` in `combat_resolver.gd` returns zero. ConfigFile parse of `project.godot` confirms neither class appears in `[autoload]`. Combined structural regex asserts `class_name CombatResolver extends RefCounted` on collapsed content (strip blank lines + comments), defending against multi-line or comment-injected bypass — mirrors ADR-0009's H-16 pattern."
    added: 2026-04-22

  - pattern: combat_dict_equality_via_hash
    status: active
    description: "Files under `src/gameplay/combat/` (especially `combat_resolver.gd`, `default_combat_resolver.gd`, `combat_batch_result.gd`) AND all test files under `tests/unit/combat/` MUST NOT compare Dictionary values via `.hash() ==` for correctness checks. The canonical comparison is `CombatBatchResult.dict_equals(a, b)` — a key-by-key walk. Escape hatch: an explicit `# HASH-OK: <justification>` comment on the hash-equality line permits the pattern for NON-correctness cases (e.g., logging-only dedup) — expected zero uses in MVP."
    why: "Dictionary.hash() returns a 32-bit int. Hash collisions are mathematically real even for flat primitive dictionaries (birthday paradox: ~77,000 entries for 50% collision probability in a 32-bit space; meaningful collisions can occur at much smaller scales with adversarial or pattern-shaped inputs). AC-COMBAT-01 (Stateless Purity, BLOCKING) and AC-COMBAT-10 (Foreground/Offline Parity, BLOCKING) are determinism gates — they require INJECTIVE comparison (two distinct outputs MUST never compare equal). A hash-collided false positive would let non-deterministic Combat output slip past these gates silently, breaking Pillar 1 (player time is sacred) undetected in production. Key-walk is trivially cheap at the scale here (≤5 archetype keys, ≤3 tier keys per CombatBatchResult). See api_decision combat_dict_equality_key_walk."
    adr: docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md
    enforcement: "CI grep across src/gameplay/combat/ + tests/unit/combat/ for pattern `\\.hash\\(\\) ==` on lines NOT containing `# HASH-OK:`. Returns zero hits at merge time. Extension to other determinism gates is a per-ADR concern; this pattern is Combat-scoped."
    added: 2026-04-22

  - pattern: combat_foreground_offline_helper_divergence
    status: active
    description: "`CombatResolver.emit_events_in_range` (foreground) and `CombatResolver.compute_offline_batch` (offline) MUST both call the shared private helper `_kill_schedule_for_loop(formation, floor)` within their method bodies. A foreground fast path that computes the schedule inline, an offline shortcut that skips the shared helper for a 'simpler' aggregation, or a refactor that splits the helper into two copies — all forbidden. Shared-private-helper routing is what makes AC-COMBAT-10 Foreground/Offline Parity structural rather than aspirational."
    why: "AC-COMBAT-10 (BLOCKING) asserts that the union of foreground kill events over a partitioned tick range equals the offline aggregate for the same (formation, floor, T). Shared helpers make this parity mechanically impossible to break: both public paths route through identical schedule generation. A divergent implementation — even one that is numerically identical at the moment of the refactor — creates a drift surface that subsequent bug fixes can amplify (one path patched; other silently stale). The failure mode is hard to diagnose: offline replay shows different kill counts than the foreground session it is meant to reproduce, and the only way to catch it is an integration test running both paths on the same input. Structural CI enforcement makes the integration test unnecessary for THIS regression class."
    adr: docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md
    enforcement: "Script-based CI step at `tests/ci/combat_structural_test.gd` using method-body-aware parsing (GDScript AST walker OR indent-tracking structured scanner). Asserts that the collapsed body of `emit_events_in_range` contains a call to `_kill_schedule_for_loop(` AND the collapsed body of `compute_offline_batch` also contains a call to `_kill_schedule_for_loop(`. A raw file-wide `grep -c _kill_schedule_for_loop >= 2` is INSUFFICIENT — it cannot distinguish 'inside one public method' from 'inside any helper or comment', and a developer could refactor one public method to skip the helper while adding a third call elsewhere and the check would silently pass. Method-body-aware implementation is mandatory."
    added: 2026-04-22

  - pattern: content_field_without_export_annotation
    status: active
    description: "Every content field on a GameData subclass (HeroClass, EnemyData, Biome, Dungeon, Floor — and future Item, MatchupRule) MUST be `@export`-decorated. A plain `var field_name: Type` without `@export` is not surfaced in the Godot inspector for `.tres` authoring and will not be serialized into `.tres` files — it becomes an instance-only runtime field that silently defaults to the type's default on every load. This defeats the entire data-driven-content contract."
    why: "Content is data, not code (Architecture Principle 4 per architecture.md). Every tunable value lives in .tres. A non-@export field on a content resource is a contract violation: either the field IS content (and must be @export) or it is derived/computed at runtime and should live on the consumer DB (HeroClassDatabase, EnemyDatabase) as a cached lookup — not on the content resource itself. Enforcement at CI catches the 'I forgot @export' regression that would otherwise silently strip a field from every .tres file in the next save."
    adr: docs/architecture/ADR-0011-resource-schemas-core-databases.md
    enforcement: "Grep CI step at `tests/ci/content_schema_test.gd`: for each of the 5 subclass files (hero_class.gd, enemy_data.gd, biome.gd, dungeon.gd, floor.gd), assert that every class-scope `var ` line is prefixed by a `@export` annotation (either on the same line or the immediately preceding line). Inherited fields from GameData are already @export-decorated in the base file and do not need re-annotation. Any `var` without `@export` returns a structural failure with the field name + file location."
    added: 2026-04-22

  - pattern: archetype_string_hardcoded_outside_constant_set
    status: active
    description: "Archetype strings (`bruiser`, `caster`, `armored`, `beast`, `construct`, `incorporeal`) MUST come from `EnemyArchetypes.*` constants — never hardcoded as string literals in consumer code (HeroClass validator, EnemyData validator, Biome.dominant_archetypes validator, MatchupResolver, MatchupResult consumers, combat matchup-multiplier lookup). A string-literal `== \"bruiser\"` comparison, an array literal `[\"bruiser\", \"caster\"]` outside the canonical file, or an `if archetype in [\"...\"]` membership check hardcoded inline — all forbidden."
    why: "Typo safety + single-source-of-truth. The archetype universe is closed (6 strings) and cross-cuts 4+ subsystems (HeroClass + EnemyData + Biome schemas + MatchupResolver + Economy matchup-multiplier lookup). Hardcoding in any consumer means a V1.0 renaming or extension requires scattered edits; a typo (`'brusier'` vs `'bruiser'`) silently fails matchup in one consumer while passing in another. Centralizing to EnemyArchetypes.BRUISER const means the GDScript parser catches typos at compile time (unknown identifier), V1.0 extensions are one-file edits, and renaming is safe."
    adr: docs/architecture/ADR-0011-resource-schemas-core-databases.md
    enforcement: "Grep CI step: scan all files under `src/` and `tests/` (excluding `assets/data/archetypes/enemy_archetypes.gd` itself) for string literals matching any of the 6 archetype strings AS STANDALONE string contents (e.g., `\"bruiser\"`, `'bruiser'`, `&\"bruiser\"` StringName). Any hit returns the file:line with the literal + suggested replacement (`EnemyArchetypes.BRUISER`). Escape hatch: comments starting with `# ARCHETYPE-LITERAL-OK:` permit intentional literal use (e.g., test fixtures asserting validator behavior on known-bad strings); expected zero uses outside tests."
    added: 2026-04-22

  - pattern: role_string_hardcoded_outside_constant_set
    status: active
    description: "Role strings (`tank`, `striker`, `precision`, `support`, `ranged`, `commander`) MUST come from `ClassRoles.*` constants — never hardcoded as string literals in consumer code (HeroClass validator, FormationAssignmentScreen role-tag display, RosterScreen role filter). Structural mirror of `archetype_string_hardcoded_outside_constant_set`."
    why: "Same rationale as archetype single-source-of-truth: typo safety + V1.0 extension safety + rename safety. Role universe is closed (6 strings); hardcoding in UI screens or validators scatters the authority. The 6 roles ship together (no MVP/V1.0 split — V1.0 class stubs load with their roles) so the constant set is stable from MVP day one."
    adr: docs/architecture/ADR-0011-resource-schemas-core-databases.md
    enforcement: "Grep CI step: scan all files under `src/` and `tests/` (excluding `assets/data/roles/class_roles.gd` itself) for string literals matching any of the 6 role strings AS STANDALONE string contents. Same mechanism as archetype check. Escape hatch: `# ROLE-LITERAL-OK:` comment permits test fixture use."
    added: 2026-04-22

  - pattern: subclass_redeclare_id_or_display_name
    status: active
    description: "GameData subclasses (HeroClass, EnemyData, Biome, Dungeon, Floor) MUST NOT redeclare `@export var id: String` or `@export var display_name: String` in their class body. Both fields are inherited from the `@abstract GameData extends Resource` base (ADR-0006). Redeclaration in a subclass creates a shadowing field that silently diverges from the base's default + validator + `.tres`-serialization behavior."
    why: "Inherited @export fields surface automatically in the Godot inspector per the ADR-0006 GameData base declaration. A subclass redeclaration would create two sources of truth for id/display_name semantics (which default? which validator? which tres-format field name?) — a drift vector with no upside. The ADR-0006 base is the single owner. Catch at CI; do not allow the redeclaration to silently work."
    adr: docs/architecture/ADR-0011-resource-schemas-core-databases.md
    enforcement: "Grep CI step at `tests/ci/content_schema_test.gd`: for each of the 5 subclass files, assert that `^[ \\t]*@export[ \\t]+var[ \\t]+id[ \\t]*:` returns 0 hits AND `^[ \\t]*@export[ \\t]+var[ \\t]+display_name[ \\t]*:` returns 0 hits. Base file `game_data.gd` is the exclusive declaration site; CI asserts both @export lines exist there."
    added: 2026-04-22

  - pattern: expected_clear_time_seconds_as_runtime_gate
    status: active
    description: "`Floor.expected_clear_time_seconds` is a design-target QA-pacing knob, NOT a runtime enforcement field. No system may read it to gate behavior (kill a run that exceeds the target, scale rewards based on elapsed-vs-target, change difficulty mid-run, or surface it to the player as a countdown). It exists solely for QA pacing validation during playtest review."
    why: "Pillar 1 (player time is sacred) violation if runtime reads this field. A run that takes longer than the designer's target is NOT a bug — it's the player playing their game their way (slower formation, stopping mid-run, taking a break). Runtime enforcement would steal progress from legitimate play. The GDD (biome-dungeon-database.md §C.1) explicitly says 'design target, NOT runtime enforcement'; this pattern enforces that at CI level so a future 'optimization' PR cannot silently start reading it for gameplay logic."
    adr: docs/architecture/ADR-0011-resource-schemas-core-databases.md
    enforcement: "Grep CI step: scan all files under `src/` for `expected_clear_time_seconds` read access. Only permitted read sites: `tests/integration/content/` (content validation), `production/qa/` (pacing reports), `tools/` (design tooling). Any read in `src/gameplay/`, `src/ui/`, `src/core/` returns a structural failure. Escape hatch: `# PACING-READ-OK:` comment for legitimate exceptions (expected zero uses in MVP)."
    added: 2026-04-22

  # ─── ADR-0012 additions (Hero Roster Mutation — Proposed 2026-04-22) ───

  - pattern: caching_heroinstance_reference_across_save_boundary
    status: active
    description: "No consumer may store a `HeroInstance` reference in a field whose lifetime exceeds the next `load_save_data()` call. After load, all HeroInstance objects are newly constructed via `HeroInstance.from_dict` — any stale field-scope references refer to orphaned objects no longer in `_heroes`. Consumers MUST store `instance_id: int` as the cross-session identity key and re-resolve via `HeroRoster.get_hero(id)` on each render / each tick read / after the `loaded` signal."
    why: "GDD Rules 4 + 13 + 14 implied but never explicitly stated that HeroInstance object identity is ephemeral across save/load. ADR-0012 elevates the implicit rule to an explicit forbidden pattern: a RosterScreen holding `var _selected_hero: HeroInstance` silently breaks across mid-session heartbeat reloads, showing stale data or NPEing on a method call. `instance_id: int` is the stable cross-session identity; `HeroInstance` object identity is transient. This pattern catches the class of bugs at CI time instead of as a runtime crash in playtesting."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "`tests/ci/heroroster_identity_test.gd`: grep scan `src/presentation/` + `src/ui/` + `src/screens/` for field-typed `HeroInstance` var declarations (regex: `^[ \\t]*var[ \\t]+[_a-zA-Z]+[ \\t]*:[ \\t]*HeroInstance`). Any hit fails the build with an allowlist exception list. Current allowlist: `src/gameplay/orchestrator/dungeon_run_snapshot.gd` (ADR-X02 will define snapshot lifetime explicitly). Single-call-scope locals (`var hero := roster.get_hero(id)` in a method body) are NOT field declarations and pass. Per-call `Array[HeroInstance]` parameters/returns (ADR-0009 + ADR-0010 resolver signatures) are NOT field declarations and pass."
    added: 2026-04-22

  - pattern: external_access_to_underscore_private
    status: active
    description: "Code outside `src/gameplay/roster/hero_roster.gd` MUST NOT read or write `HeroRoster._heroes`, `HeroRoster._formation_slots`, `HeroRoster._next_instance_id`, `HeroRoster._orphaned_heroes`, or `HeroRoster._boot_validating`. Underscore prefix is a project-wide privacy convention; GDScript has no `private` keyword so this is CI-enforced."
    why: "Encapsulation. The 4-method mutation API (add/remove/set_level/set_slot) is the only sanctioned write path, and the read API (16 methods) is the only sanctioned read path. Direct private-state access bypasses invariants (monotonic _next_instance_id, cap enforcement, auto-clear-duplicate-slot, signal emission) and creates drift that breaks on any future internal refactor of HeroRoster."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "Grep CI step in `tests/ci/heroroster_encapsulation_test.gd`: scan all `.gd` files outside `src/gameplay/roster/hero_roster.gd` for `HeroRoster._heroes`, `HeroRoster._formation_slots`, `HeroRoster._next_instance_id`, `HeroRoster._orphaned_heroes`, `HeroRoster._boot_validating`. Any hit fails the build. Also applies to the `/root/HeroRoster.` autoload path form. No allowlist — all access goes through public methods."
    added: 2026-04-22

  - pattern: heroinstance_direct_construction_outside_factory
    status: active
    description: "`HeroInstance.new()` MUST only be called from `HeroInstance.create()` and `HeroInstance.from_dict()` (the two sanctioned static factories in `src/gameplay/roster/hero_instance.gd`). External code MUST NOT construct HeroInstance directly — it would bypass the factory's private-field assignment path and produce an instance with uninitialized `_instance_id == 0` (which then collides with the formation-slot-empty sentinel)."
    why: "The zero-arg `_init` pattern means `HeroInstance.new()` yields an uninitialized object. Private-field defaults are all zeros/empty strings. A test or helper that calls `HeroInstance.new()` + mutates private fields directly would bypass both the factory-initialization guarantee and the monotonic-id discipline. Factories are the single sanctioned construction path."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "Grep CI step: scan all `.gd` files for `HeroInstance.new(`; allowlist = `src/gameplay/roster/hero_instance.gd` only (the factories themselves). Any hit elsewhere fails the build. Escape hatch: `# HEROINSTANCE-NEW-OK:` comment permits intentional test-fixture use (expected zero uses outside the owning file)."
    added: 2026-04-22

  - pattern: heroinstance_mutation_outside_heroroster
    status: active
    description: "`HeroInstance._set_level(new_level: int)` is the only mutation method on HeroInstance (sets `_current_level` directly). It MUST only be called from `src/gameplay/roster/hero_roster.gd` (specifically inside `HeroRoster.set_hero_level()`). External code MUST NOT call `hero._set_level(...)` directly — all level mutations go through `HeroRoster.set_hero_level(instance_id, new_level)` which enforces the clamp, emits the signal, and routes through the sole-caller (Hero Leveling System) contract."
    why: "If HeroLeveling or any other caller bypasses `HeroRoster.set_hero_level()` and calls `hero._set_level()` directly, the clamp is skipped, the signal does not fire, and subscribers (RosterScreen, HeroLeveling refund path) observe an out-of-band mutation. Routing through the public API ensures the 4-method contract is the single path."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "Grep CI step: scan all `.gd` files for `\\._set_level(` call sites; allowlist = `src/gameplay/roster/hero_roster.gd` only. Any hit elsewhere fails the build."
    added: 2026-04-22

  - pattern: instance_id_value_zero_as_real_hero
    status: active
    description: "`instance_id == 0` is reserved as the 'no hero in this formation slot' sentinel. Real heroes MUST have `instance_id >= 1` (assigned by `_next_instance_id` starting at 1). Boot validation rejects any save dict entry with `instance_id == 0` as orphan; runtime `add_hero()` never produces 0 (monotonic counter starts at 1)."
    why: "Formation slots use `Array[int]` with `0` as the empty marker. If a real hero ever held `instance_id == 0`, it would be indistinguishable from an empty slot in `_formation_slots` lookups and skipped by `get_formation_heroes()`. The 0-sentinel discipline is what makes the `Array[int]` formation container work without null boxing."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "Runtime assertion inside `load_save_data` Step 1: any hero with `instance_id == 0` in the save dict is dropped with reason 'instance_id 0 is reserved' + push_error. CI test `boot_validation_test.gd` feeds a save dict with `instance_id = 0` and asserts the orphan drop path fires. `_next_instance_id` starting at 1 + monotonic-only increment prevents runtime creation of id-0 heroes."
    added: 2026-04-22

  - pattern: instance_id_reuse_after_remove
    status: active
    description: "`HeroRoster._next_instance_id` MUST be monotonic — only ever incremented, never decremented or reset (even after `remove_hero()` frees an id). If hero id 5 is removed and the next `add_hero()` produces id 6 (not id 5), that is the correct behavior. Reusing ids breaks the stability contract downstream consumers rely on for save-file refs + UI selections + formation slot pointers."
    why: "A save file written before removal of hero 5 may have `formation_slots = [5, 0, 0]`. If the save is corrupted or an attacker crafts a variant, boot validation handles the orphan. But a LEGITIMATE `remove_hero(5) + add_hero() → id 5` scenario would silently place the new hero in the old hero's formation slot — wrong hero, wrong class, wrong level. Monotonic-never-reused guarantees the id space is globally unique across the save's entire lifetime."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "`tests/unit/roster/mutation_api_test.gd` H-15 exercises `remove_hero(2) + add_hero()` → asserts new hero has `instance_id == _next_instance_id_pre_remove`, NOT 2 or 3. Also grep check: `_next_instance_id` must never appear on the left of a decrement or a non-+1 assignment (except in `load_save_data` Step 4 repair, which sets to `max(ids) + 1`)."
    added: 2026-04-22

  - pattern: heroinstance_field_set_expansion_without_schema_version_bump
    status: active
    description: "The `HeroInstance` class MUST declare exactly 5 private vars (`_instance_id`, `_class_id`, `_display_name`, `_current_level`, `_xp`). Adding a 6th field (e.g., `_xp_into_level`, `_equipment_ref`, `_nickname`) requires an ADR superseding ADR-0012 + Save/Load `schema_version` bump (ADR-0004) + migration pass in SaveLoadSystem's MIGRATION state. CI catches field-set expansion at PR time to prevent silent save-format drift."
    why: "The 5-field shape is persisted in every save file. Adding a field without a schema_version bump means: old save files lack the field → from_dict() receives a Dictionary without the key → either a crash on strict key access or a silent default-value hydration that does not match the hero's true history. Save-file stability is load-bearing for Pillar 1 (respect player time) — player histories survive patches. ADR-0004 + ADR-0012 together require explicit supersession for any field set change."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "CI step in `tests/ci/heroinstance_field_set_test.gd`: parse `src/gameplay/roster/hero_instance.gd` (treat as text); regex count of `^[ \\t]*var[ \\t]+_[a-z_]+[ \\t]*:` matches must equal exactly 5; test fails otherwise with message listing which fields are present vs the locked 5. Also asserts `to_dict()` keys list is exactly `['instance_id', 'class_id', 'display_name', 'current_level', 'xp']`."
    added: 2026-04-22

  - pattern: roster_state_container_direct_mutation_outside_heroroster
    status: active
    description: "Direct mutation of `HeroRoster._heroes` (Dict write/erase), `HeroRoster._formation_slots` (Array write), or `HeroRoster._next_instance_id` (int assign) MUST only occur inside `src/gameplay/roster/hero_roster.gd`. External code MUST use the 4-method mutation API (`add_hero`, `remove_hero`, `set_hero_level`, `set_formation_slot`)."
    why: "Overlaps with `external_access_to_underscore_private` but targets the write side specifically. The mutation API enforces: cap check, class_id resolve, instance_id monotonicity, name-pool deduplication, duplicate-slot auto-clear, signal emission, and boot-validation suppression. Direct `_heroes[id] = hero` bypasses all of it. This pattern makes the invariant explicit so PR review can flag it distinctly from simple read access violations."
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    enforcement: "Grep CI step: for `.gd` files outside `src/gameplay/roster/hero_roster.gd` + `load_save_data`-internal code, fail on: `_heroes\\[.*\\][ \\t]*=` (Dict write), `_heroes\\.erase\\(` (Dict erase), `_formation_slots\\[.*\\][ \\t]*=` (Array write), `_next_instance_id[ \\t]*=` (int assign). All of those must be inside hero_roster.gd. The load_save_data inside hero_roster.gd IS allowed to write — it is the owning file. No allowlist."
    added: 2026-04-22

  # ─── Economy (ADR-0013) ──────────────────────────────────────────────────

  - pattern: hardcoded_balance_value_outside_economy_config
    status: active
    description: "No `.gd` file outside `src/gameplay/economy/economy_config.gd` (and its `.tres` instance) may contain an integer literal > 10 that represents a tuning knob value (BASE_DRIP, BASE_KILL, BASE_RECRUIT, BASE_LEVEL, FLOOR_CLEAR_BONUS, display thresholds, LOSING_RUN_LOOT_FACTOR, RECRUIT_RATIO, LEVEL_RATIO, MATCHUP_GOLD_MULTIPLIER, MATCHUP_DRIP_BONUS, LEVEL_CAP). Structural engineering constants (`GOLD_SANITY_CAP = 1_000_000_000_000`, `OFFLINE_REPLAY_REASON`), loop indices (0, 1, 2), array sizes (1-10), and tier indices (1, 2, 3) are allowlisted."
    why: "Designer tuning authority. GDD §G lists 26 tuning knobs with safe ranges; all are expected to be tuned iteratively during playtest. If any live in .gd as `const`, the designer must file a coder ticket to tune — playtest iteration speed collapses. The `economy_config.tres` rule IS the single most load-bearing productivity contract for Economy — it exists entirely to keep tuning authority with designers and out of the coder critical path."
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    enforcement: "Grep CI step `tests/ci/economy_hardcoded_values_test.gd`: scan `src/gameplay/economy/economy.gd` + any other `.gd` under `src/gameplay/economy/` except `economy_config.gd`; extract integer literals > 10; compare against allowlist (GOLD_SANITY_CAP value, loop indices, array sizes per Decision §5); fail with explicit line + literal value on any disallowed match."
    added: 2026-04-22

  - pattern: economy_reads_losing_run_state
    status: active
    description: "Economy MUST NOT read `DungeonRunOrchestrator.losing_run` or any equivalent run-outcome state (`survived`, `hp_bonus_factor`, etc.). All outcome-dependent factors (`LOSING_RUN_LOOT_FACTOR`, `MATCHUP_GOLD_MULTIPLIER`) are applied by the Orchestrator via `_attribute_kill_gold` + `_attribute_floor_clear_bonus` BEFORE the Economy method call. Economy receives post-factor amounts only."
    why: "Pillar-1 architectural integrity. The Economy GDD §C.2.3 A2 analysis established that the per-tick drip subscription has no architectural home for `losing_run` state (it's a run-state attribute, but drip is subscription-driven and fires regardless of run outcome — drip is run-outcome-independent by design). Having a second LOSING application inside Economy would double-halve the floor-clear bonus + kill gold, silently breaking AC H-02 + AC H-14. The only architecturally correct location for the factor is inside the Orchestrator's `_attribute_*` helpers — ADR-0013 codifies this as a forbidden pattern to prevent a future 'add safety factor' regression."
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    enforcement: "Grep CI step `tests/ci/economy_losing_run_test.gd`: scan `src/gameplay/economy/*.gd` for identifiers matching `losing_run|losing|survived|hp_bonus_factor`; exclude lines starting with `#` (comments); fail on any non-comment match."
    added: 2026-04-22

  - pattern: economy_signal_emission_during_offline_replay
    status: active
    description: "Economy MUST NOT emit `gold_changed` or `first_clear_awarded` while `_is_offline_replay == true`. The three guarded mutator methods (`add_gold`, `try_spend`, `try_award_floor_clear`) MUST precede every `.emit(...)` with `if not _is_offline_replay:` or equivalent. EXEMPT: the single aggregate `gold_changed.emit(...)` at the end of `compute_offline_batch` that fires AFTER `_is_offline_replay = false` — this is the legitimate post-replay notification and MUST NOT be flagged."
    why: "AC H-10 performance budget (< 500 ms for 576 000-tick offline replay). GDD §C.6 analysis: `gold_changed` signal dispatch at 200-500 ns × 576k = 230 ms alone would blow the budget. Even one unguarded signal in the hot path is an AC H-10 regression. Offline first-clears surface via OfflineResult.events_log for the Return-to-App screen, not via the live signal."
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    enforcement: "Grep CI step `tests/ci/economy_signal_suppression_test.gd`: restrict scan to the three mutator method bodies in `src/gameplay/economy/economy.gd` (`add_gold`, `try_spend`, `try_award_floor_clear`); scan for `\\.emit\\(` call sites; verify each is preceded (within the same control-flow block) by `if not _is_offline_replay:` or equivalent guard; fail on any unguarded emit. MUST NOT scan `compute_offline_batch` body (the post-replay aggregate emit is the legitimate exception). Specialist NOTE #8 (LOAD-BEARING fold) documents this scope restriction."
    added: 2026-04-22

  - pattern: try_spend_with_non_positive_amount
    status: active
    description: "Callers MUST NOT invoke `Economy.try_spend(amount, reason)` with `amount < 0`. `amount == 0` returns `true` (AC H-12 no-op). `amount < 0` triggers `push_error` + returns `false`. The forbidden pattern targets call-site literal-negative passes (e.g., `try_spend(-100, '...')`) which are authoring bugs; non-literal negatives (e.g., computed `try_spend(-user_input, ...)`) are caller responsibility to guard + surface via runtime push_error."
    why: "Symmetric invariant to `add_gold`'s positive-only contract. `try_spend` + `add_gold` form a bidirectional contract; a negative spend would silently become a credit, bypassing AC H-05 + AC H-06 atomicity guarantees. Explicit error surface prevents the silent-bug class where a caller miscomputes a refund amount as a negative spend and accidentally credits gold. Also interacts with `level_cost_cap_sentinel` -1 return: passing -1 to try_spend produces a LOUD push_error, not a silent credit."
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    enforcement: "Grep CI step `tests/ci/economy_try_spend_negative_test.gd`: scan `src/*/` for `try_spend(-[0-9]+[^)]*)` literal-negative call patterns; fail on any match. Non-literal negative guard is runtime-only via push_error; no static-analysis enforcement for computed-negative call sites."
    added: 2026-04-22

  - pattern: offline_replay_progressed_domain_subscriber
    status: active
    description: "Domain-layer code (src/core, src/domain, src/gameplay — anything that is not src/ui or src/presentation) MUST NOT subscribe to `OfflineProgressionEngine.offline_replay_progressed`. This signal is UI-layer-only."
    why: "The per-chunk progressed signal exists to drive the cozy modal progress spinner. Domain subscribers would defeat the chunk-budget optimization (115 chunks × N domain handlers = O(115N) computation during replay, blowing AC-TICK-10)."
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    enforcement: "Grep CI: `grep -rn 'offline_replay_progressed' src/ | grep -v 'src/ui\\|src/presentation' | grep '\\.connect'` must return zero hits."
    added: 2026-04-22

  - pattern: heroinstance_cache_outside_runsnapshot_allowlist
    status: active
    description: "Field-typed `HeroInstance` vars MUST NOT appear in src/ui, src/presentation, or any code path outside the ADR-0014 RunSnapshot allowlist (3 call sites: CombatResolver.compute_offline_batch, CombatResolver.emit_events_in_range, MatchupResolver.resolve). All other consumers MUST reference heroes by `instance_id: int` and re-resolve via `HeroRoster.get_hero(id)` per call."
    why: "This is the ADR-0014 allowlist exception to ADR-0012's `caching_heroinstance_reference_across_save_boundary` forbidden pattern. Without this narrow enforcement, the allowlist would silently expand and reintroduce the cross-save-boundary HeroInstance caching hazard."
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    enforcement: "Grep CI: `grep -rE 'HeroInstance[\\] ]' src/ui src/presentation | grep -E '(var |@export var )'` returns zero hits. Separately: `grep -rE 'formation: Array\\[HeroInstance\\]' src/core src/domain` matches only the 3 allowlisted sites (validated against `tests/ci/heroinstance_allowlist.txt`)."
    added: 2026-04-22

  - pattern: offline_summary_field_set_expansion_without_version_bump
    status: active
    description: "Adding a new field to `OfflineSummary` (src/offline/offline_summary.gd) without bumping a schema_version constant AND adding a downstream ReturnToAppScreen consumer handler is forbidden."
    why: "OfflineSummary is the sole payload of the `offline_rewards_collected` signal. Silent field additions can crash ReturnToAppScreen or cause missing-field bugs in post-replay UI. Mirrors save-file schema evolution discipline."
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    enforcement: "Static analysis: field-set hash of OfflineSummary must match a registered schema_version; modifying the class file without updating the corresponding test fixture + ReturnToAppScreen consumer branch trips CI `tests/ci/offline_summary_schema_test.gd`."
    added: 2026-04-22

  - pattern: per_chunk_domain_signal_emission_during_offline_replay
    status: active
    description: "Domain signals (Economy.gold_changed, Economy.first_clear_awarded, Orchestrator.floor_cleared_first_time, HeroRoster.hero_recruited/hero_leveled/hero_removed) MUST NOT be emitted during a chunk while `_is_offline_replay=true`. They fire ONCE post-replay as aggregates, in the locked order per ADR-0014 §4."
    why: "Per-chunk domain signals compound with the 115-chunk iteration and blow AC-TICK-10. Also violate the ADR-0013 locked signal-suppression contract + the Pass-I.15 offline-emission parity invariant (aggregate emission only). Reopening per-chunk emission would require re-litigating ADR-0013."
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    enforcement: "Test spy fixture `tests/integration/offline_signal_order_test.gd`: runs a synthetic 576k-tick replay + asserts no `gold_changed` / `first_clear_awarded` / `floor_cleared_first_time` fires while `_is_offline_replay=true`; exactly one of each fires after with the locked aggregate ordering."
    added: 2026-04-22

  - pattern: worker_thread_pool_for_offline_replay_in_mvp
    status: active
    description: "MVP offline replay implementation MUST NOT use `WorkerThreadPool` or any other multi-thread parallelism strategy. Main-thread yield via `await get_tree().process_frame` is the locked choice."
    why: "Godot 4.6 RefCounted ownership across thread boundaries has documented caveats not [VERIFIED] empirically for this project. AC-COMBAT-10 offline/foreground parity is harder to prove when thread scheduling introduces timing variance. The adaptive-chunking main-thread approach already satisfies AC-TICK-10 on min-spec mobile. V1.0 revisit permitted if telemetry shows replay wall time is a live pain point, but MVP is locked."
    adr: docs/architecture/ADR-0014-offline-replay-batch-chunking-and-snapshot-schema.md
    enforcement: "Grep CI: `grep -rn 'WorkerThreadPool' src/offline` must return zero hits in MVP."
    added: 2026-04-22

