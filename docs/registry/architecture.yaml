# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: combo-system
    status: active
    budget_ms: 0.5
    platform: All
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    notes: "Covers all 18 simultaneously-active combo effects. Estimated actual cost <0.05 ms/frame — event-driven with zero cost for idle frames. Re-profile after E4-003 Mage effects land; fail the build if any single trigger dispatch exceeds 0.1 ms."
    referenced_by:
      - docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15
    revised: ""

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: combo_trigger_mechanism
    status: active
    api: "event_subscription (PlayerController.OnSkillUsed, Health.OnDied, PlayerController.OnEnemyKilled; subscribed in Activate(), unsubscribed in Deactivate())"
    not: "per_frame_polling in Update() or coroutine tick loops"
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    reason: "18 simultaneously active effects × 60fps polling would violate the <0.5 ms/frame budget. Event subscription gives zero cost for idle frames. Named methods (not anonymous lambdas) enable clean unsubscription."
    referenced_by:
      - docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15
    revised: ""

  - purpose: trigger_context_passing
    status: active
    api: "readonly struct TriggerContext (stack-allocated, pass by copy)"
    not: "object-boxed parameters or System.Object[] argument arrays"
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    reason: "Combo triggers fire per hit/kill — boxed parameters would churn GC in hot paths. readonly struct is stack-allocated and guarantees zero heap per trigger."
    referenced_by:
      - docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
