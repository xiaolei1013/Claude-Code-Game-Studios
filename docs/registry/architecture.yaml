      - Recruitment                                      # is_at_cap(), get_copies_owned(class_id)
      - HeroLeveling                                     # get_hero(id) for current_level + class.tier lookup
      - FormationAssignment                              # get_all_heroes(), has_hero(id), get_formation_slot(i)
      - CombatResolver                                   # get_formation_heroes() → Array[HeroInstance] value pass (ADR-0010)
      - MatchupResolver                                  # same — via Orchestrator forward (ADR-0009)
      - DungeonRunOrchestrator                           # get_formation_heroes() once at run start
      - RosterScreen                                     # get_all_heroes(), get_hero(id) — re-resolve-by-id pattern per stability invariant
      - RecruitScreen                                    # get_copies_owned(class_id), is_at_cap()
    shape: |
      # 16 read methods per hero-roster.md Rule 15.
      func get_hero(instance_id: int) -> HeroInstance            # null if not found
      func get_all_heroes() -> Array[HeroInstance]               # default sort BY_CLASS then BY_LEVEL_DESC
      func get_formation_heroes() -> Array[HeroInstance]         # skips empty slots; slot-index order
      func get_copies_owned(class_id: String) -> int             # O(N) scan bounded at MAX_ROSTER_SIZE
      func get_hero_count() -> int                               # _heroes.size()
      func is_at_cap() -> bool                                   # _heroes.size() >= MAX_ROSTER_SIZE
      func get_formation_strength() -> float                     # Economy contract; range [1.0, 3.0]; empty-formation guard returns 1.0
      func get_formation_slot(slot_index: int) -> int            # raw slot value (0 = empty sentinel)
      func has_hero(instance_id: int) -> bool                    # id in _heroes
      # + get_save_data() / load_save_data(data) / seed_first_launch_state() / get_orphaned_heroes_and_clear()
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md       # Economy consumer: get_formation_strength per tick (via Orchestrator drip composition) + get_copies_owned(class_id) per recruit-cost query (O(N) scan bounded at MAX_ROSTER_SIZE=30)
      - design/gdd/hero-roster.md                        # §C Rule 15 + §D.1 formula
      - design/gdd/economy-system.md                     # §C.6 offline-replay contract cites get_formation_strength
    notes: "All reads compute on demand from authoritative state — no cached derived fields (get_copies_owned, get_hero_count, is_at_cap all re-derive from _heroes per call). Rationale: Pillar 2 (every class feels distinct) pricing curve is load-bearing and cannot tolerate cache drift. get_formation_strength() has explicit empty-formation guard (returns 1.0 without computing avg_formation_level) per hero-roster.md §D.1 / H-23 / H-11 case (a)."
    added: 2026-04-22

