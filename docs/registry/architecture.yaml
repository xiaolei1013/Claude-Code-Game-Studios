  - contract: save_envelope_format
    status: active
    pattern: shared_resource           # byte-exact binary file at user://save_slot_1.dat
    producer: SaveLoadSystem
    consumers:
      - Economy
      - HeroRoster
      - FloorUnlockSystem
      - FormationAssignment
      - Recruitment
      - DungeonRunOrchestrator
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    signature: |
      [MAGIC: 4 bytes "LGLD" 0x4C 0x47 0x4C 0x44]
      [VERSION: u16 LE]
      [FLAGS: u16 LE — MVP 0x0000; bit0 = save_is_flagged_tampered V1.0+]
      [PAYLOAD_LENGTH: u32 LE]
      [PAYLOAD: PAYLOAD_LENGTH bytes — UTF-8 JSON, XOR-masked]
      [HMAC: 32 bytes HMAC-SHA256 over bytes [0..12+PAYLOAD_LENGTH-1] using keys[0]]
    notes: "Header=12 bytes; footer=32 bytes; PAYLOAD_LENGTH lives INSIDE the HMAC-protected region. Consumers' get_save_data() outputs are nested under snake-cased path basename keys; SaveLoadSystem owns the _meta key exclusively (see forbidden_patterns: consumer_access_to_save_meta_namespace). On-disk schema bumps require CURRENT_SAVE_VERSION increment + migration function."
    referenced_by:
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md   # Economy consumer at rank 3 — 3-key persisted shape (gold_balance, lifetime_gold_earned, floor_clear_bonus_credited)
      - design/gdd/save-load-system.md
    added: 2026-04-22
    revised: ""

