    producer: CombatResolver           # non-autoload RefCounted (DefaultCombatResolver production subclass)
    consumers:
      - DungeonRunOrchestrator         # consumes CombatTickEvents per-tick + CombatBatchResult per batch + CombatRunSnapshot at DISPATCHING
