    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    reason: "The Recruitment UI knows the class_id string of the button the player tapped; it does NOT independently know the tier. Forcing the UI to resolve tier before calling was coupling the UI layer to HeroClass schema details. ADR-0013 tightens the contract: callers pass the string they have, Economy does the tier lookup (one line of DataRegistry.resolve). Matches ADR-0012 id-string consumer pattern (external systems never hold HeroInstance refs; they hold int ids + re-resolve). -1 sentinel on unresolvable class_id surfaces the authoring bug noisily."
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - design/gdd/economy-system.md                 # §D.3 Pass-ADR-0013-SYNC
      - docs/architecture/ADR-0011-resource-schemas-core-databases.md  # HeroClass.tier source
      - docs/architecture/ADR-0006-data-loading-boot-scan-strategy.md  # DataRegistry.resolve contract
    added: 2026-04-22

  - purpose: level_cost_cap_sentinel
    choice: "level_cost(class_tier: int, current_level: int) -> int returns -1 when current_level >= LEVEL_CAP (past-cap sentinel); also -1 on invalid tier or current_level < 1"
    not:
      - level_cost_throws_error_past_cap      # error-based sentinel; UI would need try/catch noise
