    added: 2026-04-22

  - purpose: roster_boot_validation_order
    status: active
    api: four_step_ordered_orphan_drop_slot_clear_trim_repair  # Step 1 → 2 → 3 → 4 inside load_save_data
    not: single_pass_scan                                      # Steps 1+2 interdependent (slot clear depends on orphan list); cannot interleave
    not_also: post_signal_fire_validation                      # ADR-0004 consumer contract requires signals suppressed DURING validation
    sequence: |
      Step 1 — orphan drop: for each restored HeroInstance, DataRegistry.resolve("classes", class_id); if null, drop + append to _orphaned_heroes.
      Step 2 — formation slot clear: for each _formation_slots[i], if non-zero and not in _heroes, set to 0 + push_warning.
      Step 3 — cap trim: if _heroes.size() > MAX_ROSTER_SIZE, remove highest-id heroes preserving lowest (oldest first); re-run slot clear if any trimmed hero was in formation.
      Step 4 — _next_instance_id repair: if _next_instance_id <= max(existing ids), set to max + 1.
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "Order matters. Step 1 must precede Step 2 (slot clear needs the orphan list complete). Step 3 must come after Step 1+2 (cap check is on the post-orphan-drop roster). Step 4 must come last (repairs against final _heroes). All 4 steps happen with _boot_validating == true — no signals emit during validation, so subscribers never observe an intermediate inconsistent state (e.g., orphan hero present + formation slot dangling). Per ADR-0004 consumer contract guarantee."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - design/gdd/hero-roster.md                    # §C Rule 16 + §H-08/H-09/H-10/H-17
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md  # consumer contract: signals suppressed during validation
    added: 2026-04-22

  - purpose: heroinstance_reference_lifetime
    status: active
    api: per_call_value_only                                   # Array[HeroInstance] returned by get_formation_heroes() is transient to the call
    not: caching_heroinstance_reference_across_save_boundary   # see forbidden pattern — object identity is NOT stable across load
    exception_allowlist:
      - DungeonRunOrchestrator_formation_snapshot              # ADR-X02 will define snapshot lifetime explicitly (dispatch → run-complete or offline-batch-complete)
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "After load_save_data(), all HeroInstance objects are newly constructed via HeroInstance.from_dict. Any consumer that cached a HeroInstance reference in a field (e.g., `var _selected_hero: HeroInstance` on a RosterScreen) holds a stale pointer — the object is orphaned from _heroes, mutations to it won't fire signals, and the displayed state diverges from the save state. Consumers MUST store instance_id: int as the cross-session identity key; re-resolve via roster.get_hero(id) on each render / tick / post-loaded-signal. Single-call-scope locals (`var hero := roster.get_hero(id); hero.current_level # use + discard`) are safe. Per-call `Array[HeroInstance]` passed to resolvers (ADR-0009 + ADR-0010) is safe — the array is transient to the call. The forbidden pattern targets field-scope caching."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - design/gdd/hero-roster.md                    # §C Rule 13 + Rule 14 (implicit stability invariant)
      - docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md   # Resolver statelessness
      - docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md          # Resolver statelessness
    added: 2026-04-22

  # ─── Economy (ADR-0013) ──────────────────────────────────────────────────

  - purpose: gold_currency_storage_type
    choice: "int64 single-currency with GOLD_SANITY_CAP = 1_000_000_000_000 clamp; lifetime_gold_earned int64 unbounded"
    not:
      - float_precision_loss_over_long_play
      - BigInt_library_dependency
      - separate_currency_per_faucet_type
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    reason: "GDScript int is 64-bit — 9.2 × 10^18 headroom. At aggressive V1.0 rates (10 000 gold/tick × 10 years of 8h/day idle), lifetime accumulation ~2.1 × 10^16 → 400× margin before overflow. 1 T sanity cap on spendable balance guards against silent corruption. No BigInt library needed for MVP or V1.0. Single-currency model keeps Pillar-1 offline-fairness math deterministic (no multi-currency balancing drift)."
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - design/gdd/economy-system.md                 # §C.1 + §C.6 Fermi check + §E.1
    added: 2026-04-22

  - purpose: recruit_cost_id_string_not_tier
