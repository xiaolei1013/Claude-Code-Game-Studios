  - contract: save_heartbeat_partial_envelope
    status: active
    pattern: direct_call               # TickSystem invokes SaveLoadSystem.request_heartbeat_persist
    producer: TickSystem               # heartbeat scheduler (every heartbeat_interval_seconds = 60)
    consumers:
      - SaveLoadSystem                 # writes a partial-envelope persist
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    signature: |
      func request_heartbeat_persist(time_fields: Dictionary) -> void
        # Strict subset envelope; only `_meta` time fields persisted:
        #   { "t_last_persist": int, "t_session_high_water": int, "sim_tick_counter": int }
        # Atomic + HMAC-protected per ADR-0004 envelope contract.
        # Asserts dict shape; rejects any other key.
    notes: "REFINES ADR-0004's full-envelope contract with a strict-subset partial-envelope path. Heartbeat envelopes carry ONLY _meta time fields — full state serialization happens on graceful exit (NOTIFICATION_WM_CLOSE_REQUEST) or scene_boundary_persist transitions. Crash-recovery loses ≤60s of foreground progress. On cold launch, if the most recent envelope is heartbeat-only, SaveLoadSystem signals LoadResult.HEARTBEAT_ONLY so consumers seed fresh state. Envelope size ≤512 bytes (AC-TICK-11)."
    referenced_by:
