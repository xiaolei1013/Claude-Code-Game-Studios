  # ─── Economy (ADR-0013) ──────────────────────────────────────────────────

  - id: economy_state_shape
    owner: Economy                                     # autoload rank 3 per ADR-0003
    consumers:
      - SaveLoadSystem                                  # get_save_data / load_save_data round-trip
      - Presentation                                    # Guild Hall + Recruit + Roster + Return-to-App screens read balance
      - tests
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    shape: |
      var _gold_balance: int = 0                       # int64; clamped to GOLD_SANITY_CAP = 1_000_000_000_000 (1 T)
      var _lifetime_gold_earned: int = 0               # int64 unbounded statistic
      var _floor_clear_bonus_credited: Dictionary[int, int] = {}   # ADR-0002 monotonic ledger; key: floor_index 1..5; absent key ≡ 0
      var _is_offline_replay: bool = false             # transient; NOT persisted; drives signal suppression
      # Persisted save shape (exactly 3 top-level keys):
      # { "gold_balance": int, "lifetime_gold_earned": int, "floor_clear_bonus_credited": Dictionary[int, int] }
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - docs/architecture/ADR-0002-losing-first-clear-reclaimable-on-win.md  # monotonic ledger origin
      - design/gdd/economy-system.md                   # §C.1 + §C.2.3 + §H-11 save round-trip AC
    notes: "Transient `_is_offline_replay` MUST NOT appear in get_save_data output (validated by AC H-11). int64 sanity cap + lifetime-unbounded split per §E.1."
    added: 2026-04-22

  - id: economy_mutation_api
    owner: Economy                                     # autoload rank 3
    consumers:
      - DungeonRunOrchestrator                          # add_gold per kill; try_award_floor_clear on first-clear
      - Recruitment                                     # try_spend(cost, "recruit_<class_id>")
      - HeroLeveling                                    # try_spend(cost, "level_up_<id>_<new_level>")
      - tests
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    shape: |
      func add_gold(amount: int, reason: String = "credit") -> void
          # amount < 0 → push_error + return; amount == 0 → no-op; clamp to GOLD_SANITY_CAP;
          # emit gold_changed(new_balance, delta, reason) UNLESS _is_offline_replay.
      func try_spend(amount: int, reason: String) -> bool
          # amount < 0 → push_error + return false; amount == 0 → return true (H-12 no-op);
          # insufficient → silent return false (no mutation); sufficient → deduct + emit gold_changed
          # (unless _is_offline_replay) + return true.
      func try_award_floor_clear(floor_index: int, bonus_amount: int) -> bool
          # ADR-0002 credit-the-gap: range-guard + negative-bonus-guard + monotonic ledger;
          # emits first_clear_awarded(floor_index) AT MOST once per floor per save lifetime.
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - docs/architecture/ADR-0002-losing-first-clear-reclaimable-on-win.md
      - design/gdd/economy-system.md                   # §C.2.3a + §C.3 + §H-02/H-03/H-05/H-06/H-12/H-14
      - design/gdd/dungeon-run-orchestrator.md         # §D.1 attribute_kill_gold + §D.2 attribute_floor_clear_bonus
    notes: "Orchestrator applies LOSING_RUN_LOOT_FACTOR + MATCHUP_GOLD_MULTIPLIER BEFORE calling add_gold / try_award_floor_clear. Economy never reads losing_run state (codified by forbidden pattern `economy_reads_losing_run_state`)."
    added: 2026-04-22

  - id: economy_cost_curves_api
    owner: Economy                                     # autoload rank 3
    consumers:
      - Recruitment                                     # recruit_cost(class_id, copies_owned) per UI render / pre-recruit check
      - HeroLeveling                                    # level_cost(class_tier, current_level) per UI render / pre-level-up check
      - Presentation                                    # Recruit Screen + Roster Detail Screen button grey-out logic
      - tests
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    shape: |
      func recruit_cost(class_id: String, copies_owned: int) -> int
          # Resolves HeroClass via DataRegistry.resolve("classes", class_id); reads .tier;
          # returns floori(BASE_RECRUIT[tier] * RECRUIT_RATIO ^ copies_owned).
          # Returns -1 on unresolvable class_id OR negative copies_owned (authoring bug).
      func level_cost(class_tier: int, current_level: int) -> int
          # Returns floori(BASE_LEVEL[class_tier] * LEVEL_RATIO ^ (current_level - 1)).
          # Returns -1 if current_level >= LEVEL_CAP (past-cap sentinel per AC H-08).
          # Returns -1 on invalid class_tier or current_level < 1.
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - design/gdd/economy-system.md                   # §D.3 recruit + §D.4 level + §H-07/H-08 ACs
      - docs/architecture/ADR-0011-resource-schemas-core-databases.md  # HeroClass.tier input
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md  # get_copies_owned source
    notes: "Pure functions — no state mutation. recruit_cost accepts class_id: String (ADR-0013 contract tightening vs pre-ADR class_tier-keyed form — the Recruitment UI has class_id naturally; forcing UI to know about tier was an unnecessary coupling). -1 sentinel on any error path; callers MUST check before offering purchase."
    added: 2026-04-22

  - id: economy_offline_batch_contract
    owner: Economy                                     # autoload rank 3
    consumers:
      - OfflineProgressionEngine                        # calls Economy.compute_offline_batch(tick_budget) on session start
      - DungeonRunOrchestrator                          # also exposes compute_offline_batch per ADR-0010; Economy path is complementary
      - ReturnToAppScreen                               # reads OfflineResult.events_log for "while you were away" summary
      - tests
    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    shape: |
      func compute_offline_batch(tick_budget: int) -> OfflineResult
          # Sets _is_offline_replay = true; reads formation strength ONCE;
          # closed-form drip total = drip_per_tick * tick_budget (O(1) multiply);
          # iterates batch events (kills, floor-clears) with seeded RNG (seed = t_last_persist XOR tick_budget);
          # all signal emission suppressed during batch; clears flag; emits ONE aggregate
          # gold_changed(final, total_delta, "offline_replay") after completion.
      class OfflineResult extends RefCounted:
          var gold_earned: int
          var kills_by_tier: Dictionary[int, int]       # enemy_tier → kill count
          var floors_cleared: Array[int]                # floor_index values first-cleared during replay
          var events_log: Array[Dictionary]             # player-facing Return-to-App entries
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - design/gdd/economy-system.md                   # §C.6 hybrid replay strategy + §H-09 determinism + §H-10 performance
      - docs/architecture/ADR-0010-combat-resolver-snapshot-and-parity.md  # CombatBatchResult handoff
    notes: "Economy-side share of AC-TICK-10 / AC H-10 500 ms budget is ~100-150 ms; Orchestrator owns ~300-400 ms of the same budget (per ADR-0010 compute_offline_batch_total budget). OfflineResult is RefCounted (Specialist NOTE #9 fold — prevents memory leak since it's constructed on every app resume)."
    added: 2026-04-22

