    #   _ready() null-checks each DI field and calls `.new()` on production defaults if still null;
    #   Public setters `set_foo(resolver)` mutate the field BEFORE _ready() fires (tests call them after `.new()`, before `add_child`);
    #   Setter asserts non-null input.
    # Production path: boot → _init() no-op → _ready() null-check fires → DefaultFoo.new() installed → ready to use
    # Test path:       test → Orchestrator.new() → set_foo(spy) → add_child(orch) → _ready() null-check short-circuits → spy preserved
    not: required_arg_init_on_autoload          # MECHANICALLY IMPOSSIBLE — autoload.md Claim 4 [VERIFIED]
    not_also: wire_dependencies_one_shot_named_method  # godot-specialist Step 4.5 Option B; equivalent rejected by orchestrator GDD §J.7 Option E — fails open (dispatch before wiring crashes) vs fails closed (lazy default always has a production instance)
    not_also: service_locator_pattern           # rejected — adds indirection over Godot's rank-ordered autoload system
    not_also: test_only_production_setter_hidden_by_OS_is_debug_build # rejected — §J.1 rationale: asymmetric gating is less maintainable than symmetric public setters with convention-enforced production-no-call
    not_also: runtime_set_script_monkey_patching # rejected — fires _ready re-entry, non-rollback-clean across tests
    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    reason: "Godot's autoload system instantiates via `_create_instance` which calls `_init()` with zero arguments (autoload.md Claim 4 [VERIFIED], Pass-INIT-PROBE 2026-04-22). Lazy-default with public setters is the only pattern that (a) respects the autoload zero-arg `_init` constraint, (b) supports test spy injection via the same code path without `OS.is_debug_build()` asymmetry, (c) preserves static typing on the injected deps, (d) integrates with GdUnit4's mock-by-subclass pattern required for AC-ORC-11 mockability, (e) FAILS CLOSED — a ship build that forgot to do any DI wiring still boots playable. Codifies `dungeon-run-orchestrator.md` §J.1's already-locked Option A."
