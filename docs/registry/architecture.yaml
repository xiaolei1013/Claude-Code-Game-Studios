    adr: docs/architecture/ADR-0009-matchup-resolver-di-and-majority-threshold.md
    signature: |
      class_name MatchupResult extends RefCounted
      var is_advantaged: bool
      var matched_archetypes: Array[String]
      # Invariants:
      #   - matched_archetypes sorted alphabetically (byte-identical golden-file comparison)
