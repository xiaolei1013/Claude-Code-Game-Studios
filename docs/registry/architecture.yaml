# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: combo_per_frame_polling
    status: active
    description: "ComboEffect subclasses must not poll for trigger conditions in Update() or coroutines. Subscribe to the appropriate C# event in Activate() and unsubscribe in Deactivate()."
    why: "18 effects × 60 fps polling exceeds the combo-system <0.5 ms/frame budget. Polling also creates hidden coupling between PlayerController state exposure and combo trigger logic. ADR-0003 Open Question A3 explicitly rejected polling."
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15

  - pattern: monobehaviour_combo_effect
    status: active
    description: "ComboEffect subclasses must inherit from abstract ScriptableObject, never MonoBehaviour. No AddComponent/Destroy on combo discovery/run-end."
    why: "AddComponent/Destroy allocates heap memory, triggering GC at combo discovery and run end. MonoBehaviours can't be authored as flat assets in ComboDatabase without prefab indirection, creating unnecessary authoring friction for a solo developer workflow. ADR-0003 Alternative 1 rejection reason."
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15

  - pattern: runtime_scriptableobject_mutation
    status: active
    description: "Systems must not write back to ScriptableObject assets at runtime. Transient runtime state (e.g., ComboDefinition.discoveredFlag when persisted across sessions) belongs in save data, not on the SO asset."
    why: "In Editor, SO mutations persist between play sessions, masking reset bugs and faking persistence. In standalone builds, SO assets are effectively read-only — writes would fail silently or corrupt the asset database. Per-player/per-save state belongs in save data keyed by a stable identifier (e.g., combo name)."
    adr: docs/architecture/adr-0003-combo-effect-architecture.md
    added: 2026-04-15

