  - purpose: offline_replay_closed_form_drip
    choice: "compute_offline_batch uses O(1) closed-form multiply `drip_per_tick * tick_budget` for drip income (NOT per-tick loop) + O(N) batch-event iteration for discrete kills/floor-clears; formation_strength read ONCE per batch (not per tick)"
    not:
