# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: cross_autoload_reference_general
    status: active
    api: bare_identifier_resolution    # e.g., DungeonRunOrchestrator.signal_x
    not: get_node_or_null_with_root_path   # only allowed at Save/Load boundary (see save_consumer_resolution)
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    reason: "Bare identifiers preserve static typing and are refactor-friendly. VERIFIED working in Godot 4.6 per autoload.md Claim 1 sub-claim (c)."
    referenced_by:
      - docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    added: 2026-04-22
    revised: ""

  - purpose: save_consumer_resolution
    status: active
    api: per_call_get_node_or_null     # called once at each persist AND each load — NEVER cached
    not: cached_onready_var_reference
    adr: docs/architecture/ADR-0003-autoload-rank-table-canonical.md
    reason: "Hot-reload swaps the underlying autoload Node instance under the same path; cached references dangle. Per-call resolution is sub-microsecond (SceneTree path cache lookup) — negligible relative to HMAC + JSON dominant cost. Save/Load §C.3 Pass-5D anchored this pattern."
    referenced_by:
      - docs/architecture/ADR-0003-autoload-rank-table-canonical.md
      - design/gdd/save-load-system.md
    added: 2026-04-22
    revised: ""

  - purpose: save_payload_encoding
    status: active
    api: utf8_json_via_JSON_stringify   # Godot's stdlib JSON class
    not: messagepack                    # rejected — negligible byte savings at MVP scale
    not_also: bytes_to_var              # rejected — engine-version-coupled, undocumented at byte level
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    reason: "Inspectability in unmasked debug-mode dumps + engine-upgrade stability + native JSON well-tested in 4.6 + trivially forward-compatible field addition. Re-evaluate at V1.0 only if payload approaches 200KB."
    referenced_by:
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
      - design/gdd/save-load-system.md
    added: 2026-04-22
    revised: ""

  - purpose: save_hmac_key_derivation
    status: active
    api: multi_part_assembly_with_N2_build_version_rotation
    # Conceptually: SHA256(PART_A XOR PART_B || PART_C || build_version_string)
    # Parts live in DIFFERENT autoload scripts under non-suggestive names.
    # N=2 key history: keys[0] = current build, keys[1] = prior build's CURRENT_VERSION_STRING (compile-time const).
    not: hardcoded_constant_with_obfuscation       # rejected — single labeled const = trivial decompiler target; no rotation
    not_also: per_machine_device_id                # rejected — machine change breaks legitimate saves
    not_also: filename_salted_hardcoded            # rejected — cross-slot rename attack bypasses
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    reason: "Casual-deterrent threat model: rotation property + Pillar 1 silent migration on patch. N=2 is authoritative — N>2 prolongs cheat-tool compatibility window (harmful); N<2 destroys pre-patch saves on update (Pillar 1 catastrophe)."
    referenced_by:
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
      - design/gdd/save-load-system.md
    added: 2026-04-22
    revised: ""

  - purpose: save_hmac_implementation
    status: active
    api: gdscript_hmac_sha256_from_scratch_per_RFC_2104   # ~30-line wrapper layered on HashingContext.HASH_SHA256
    not: gdextension_libsodium_binding                    # rejected — disproportionate native-build pipeline cost for MVP threat model
    adr: docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
    reason: "Hot SHA-256 inner loop stays native via HashingContext; HMAC wrapper is ~30 lines of inspectable GDScript. Conformance gated by AC-SL-HMAC-01 — 7 RFC 4231 §4.2-4.8 test vectors must pass bit-exactly BEFORE any tamper AC runs."
    referenced_by:
      - docs/architecture/ADR-0004-save-envelope-and-hmac-scheme.md
      - design/gdd/save-load-system.md
    added: 2026-04-22
    revised: ""

  - purpose: sim_clock_implementation
    status: active
    api: process_delta_integer_accumulator   # _process(delta) accumulator pattern in TickSystem
    not: physics_process_with_engine_physics_ticks_per_second   # rejected — couples economy cadence to physics step
    not_also: timer_node                                         # rejected — frame-rate aliasing on slow frames
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    reason: "Decouples economy cadence from physics step (independent concerns); frame-rate-independent recovery (integer accumulator processes whole-tick increments per frame regardless of frame time variance). TICKS_PER_SECOND = 20 is architectural, NOT a runtime tuning knob."
    referenced_by:
      - docs/architecture/ADR-0005-time-system-dual-clock-contract.md
      - design/gdd/game-time-and-tick.md
    added: 2026-04-22
    revised: ""

  - purpose: wall_clock_read
    status: active
    api: time_get_unix_time_from_system_int_cast_at_TickSystem_sole_call_site
    # Conceptually: int(Time.get_unix_time_from_system()) — int() not floori() (floori returns float in GDScript)
    # int() cast preserves full int64 range; IEEE-754 double 53-bit mantissa is exact for any Unix ts (~10^9)
    not: direct_calls_from_any_other_system   # all other systems read TickSystem's vended int64 value (now_ms, get_last_persist_ts, etc.)
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    reason: "Eliminates float-rounding scatter across the codebase; single ownership of the OS-time boundary; downstream math is uniformly integer. now_ms() returns cached _last_wall_ts * 1000 — must NOT make a fresh Time.get_unix_time_from_system() call (godot-specialist Step 4.5 Note 2)."
    referenced_by:
      - docs/architecture/ADR-0005-time-system-dual-clock-contract.md
      - design/gdd/game-time-and-tick.md
    added: 2026-04-22
    revised: ""

  - purpose: debug_mock_clock_gate
    status: active
    api: runtime_OS_is_debug_build_guard_on_method_body
    # Pattern: each debug method begins with `if not OS.is_debug_build(): return`
    not: compile_time_const_gate                # rejected — method bodies cannot be const-gated in GDScript 4.6
    adr: docs/architecture/ADR-0005-time-system-dual-clock-contract.md
    reason: "GDScript method bodies cannot be conditionally compiled out (unlike Save/Load's `integrity_check_enabled` const which gates a single boolean check). Runtime guard + release-build no-op is the only mechanism. Acceptable MVP defense because attack surface is narrow — release exports return false from OS.is_debug_build(); AC-SL-TAMPER-05 CI scan provides additional production-exposure defense."
    referenced_by:
      - docs/architecture/ADR-0005-time-system-dual-clock-contract.md
      - design/gdd/game-time-and-tick.md
    added: 2026-04-22
    revised: ""

  - purpose: content_authoring_format
    status: active
    api: tres_text_resource_only         # Godot's text resource format
    not: json                            # rejected — loses Godot tooling, ExtResource semantics, @export introspection
