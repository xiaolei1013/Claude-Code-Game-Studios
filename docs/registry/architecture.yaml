    adr: docs/architecture/ADR-0013-economy-state-and-cost-curves.md
    reason: "Hero Leveling UI needs to distinguish 'can afford but cap reached' from 'cannot afford'. -1 sentinel is unambiguous: callers check `if cost == -1: show 'max level' else if balance < cost: show 'insufficient' else: allow`. GDD AC H-08 locks -1 as the past-cap return. Combined with try_spend's `amount < 0 → push_error` guard, passing the -1 to try_spend produces a loud failure (not a silent credit), preventing the bug class where a UI mistakenly treats -1 as a real cost."
    referenced_by:
      - docs/architecture/ADR-0013-economy-state-and-cost-curves.md
      - design/gdd/economy-system.md                 # §D.4 + §H-08
