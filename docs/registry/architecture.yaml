      class_name KillEvent extends RefCounted
      var enemy_id: StringName; var archetype: StringName; var tier: int; var is_boss: bool; var kill_tick: int
      func equals(other: KillEvent) -> bool

      class_name CombatTickEvents extends RefCounted            # foreground per-tick-range output — per-event
      var kills: Array[KillEvent]; var loop_completed_ticks: Array[int]; var first_clear_in_range: bool
      func equals(other: CombatTickEvents) -> bool

      class_name CombatBatchResult extends RefCounted           # offline batch output — aggregate-only
      var kills_by_archetype: Dictionary[StringName, int]       # typed dict (Godot 4.4+)
      var kills_by_tier: Dictionary[int, int]
      var loops_completed: int; var first_clear_tick: int; var hp_bonus_factor: float; var survived: bool; var final_tick: int
      static func dict_equals(a: Dictionary, b: Dictionary) -> bool   # public key-walk; hash-equality FORBIDDEN
      func equals(other: CombatBatchResult) -> bool

      class_name CombatRunSnapshot extends RefCounted           # Orchestrator-owned dispatch-time cache
      var formation_dps_per_tick: float; var hp_bonus_factor: float; var ticks_per_loop: int
      var survived: bool; var kill_schedule: Array[KillEvent]
      func equals(other: CombatRunSnapshot) -> bool
    notes: "Codifies `design/gdd/combat-resolution.md` §C.4 (Type Contracts) verbatim at ADR level. All four value types extend RefCounted (automatic lifecycle), use plain `var` (not @export — transient per-call, not serialized as resources), expose equals(other) -> bool for deep field-equality (AC-COMBAT-01 / AC-COMBAT-10 determinism gates). MatchupResult (ADR-0009) is the fifth value type consumed inside _kill_schedule_for_loop per-enemy but owned by ADR-0009. The == operator on these objects tests identity, NOT field equality — test code MUST call a.equals(b). Dict equality uses the static dict_equals key-walk on CombatBatchResult; hash-based equality is forbidden (see forbidden_pattern combat_dict_equality_via_hash)."
