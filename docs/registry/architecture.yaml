    reason: "AC-TICK-10 / AC H-10 500 ms budget for 576 000-tick worst-case offline replay. Per-tick loop would consume the budget on function-call overhead alone, before any economy math. Closed-form drip is O(1) per batch (one int multiply). Discrete events (kills, floor-clears) still need per-event iteration but are bounded at ~15-20 k events per dispatch (ADR-0010 CombatBatchResult). Formation snapshot is frozen at last persist per ADR-X02 (pending); no mid-replay formation changes in MVP so the single-read assumption holds."
