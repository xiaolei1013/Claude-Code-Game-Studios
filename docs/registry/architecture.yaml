  # ─── ADR-0012 additions (Hero Roster Mutation — Proposed 2026-04-22) ───

  - purpose: heroinstance_value_type_choice
    status: active
    api: class_name_HeroInstance_extends_RefCounted            # pure data record
    not: class_name_HeroInstance_extends_Resource              # would be a .tres / DataRegistry-registered — wrong category
    also_not: bare_Dictionary_with_string_keys                 # would lose type-safety + per-field validator
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "Mutable player state (current_level, recruitment-time-assigned display_name, runtime-created instances) and static read-only content (HeroClass.tres schema locked by ADR-0011) are categorically different. Resource/GameData pattern (ADR-0006 + ADR-0011) is explicitly read-only — ADR-0011's `mutating_loaded_resource` forbidden pattern would reject a mutable Resource. RefCounted gives the right lifetime semantics: newly constructed per add_hero(), destroyed per remove_hero(), serialized via to_dict/from_dict to the save file (NOT to a .tres), re-constructed on load. Bare Dictionary sacrifices type-safety + project-idiom compliance."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - design/gdd/hero-roster.md                    # §C Rule 1 authoritative
    added: 2026-04-22

  - purpose: instance_id_scheme
    status: active
    api: monotonic_positive_int_assigned_by_next_instance_id   # HeroRoster._next_instance_id (starts at 1, only ever increments)
    not: UUID_string                                           # save footprint 10x + hand-debug harder + monotonic-chronological-ordering lost
    also_not: hash_of_class_id_plus_display_name               # would collide on duplicate-name stacking
    sentinel: instance_id_equals_zero                          # reserved as 'no hero in this formation slot' marker
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "Monotonic int is simpler, smaller in save file, and gives chronological ordering for free (oldest hero = lowest id — used by boot validation cap-trim to preserve earliest-invested heroes per hero-roster.md E.2 + H-10). 64-bit int overflow is impossible in practice (>10^15 recruits). Zero-sentinel for empty formation slots is a simple idiom; formation_slots[i] == 0 is the universal empty check. UUID considered + rejected by GDD Rule 13 on save-footprint grounds. ID never reused after remove_hero — guaranteed by monotonic-only invariant."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - design/gdd/hero-roster.md                    # §C Rule 13 + §H-15
    added: 2026-04-22

  - purpose: roster_state_container_choice
    status: active
    api: typed_Dictionary_int_to_HeroInstance                  # _heroes: Dictionary[int, HeroInstance]
    not: typed_Array_of_HeroInstance                           # O(N) lookup + index-shift on removal invalidates index-based refs
    not_also: parallel_arrays_ids_and_heroes                   # double state to keep in sync
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "Dictionary[int, HeroInstance] gives O(1) lookup by instance_id — the operation formation slots + save-file references + UI selection all need per read. Array would force scanning on every lookup (N ≤ 30, cheap, but shifts on removal invalidate persistent index-based references which is the exact problem instance_id solves). Dictionary key insertion order is stable in Godot 4.4+; save/load round-trip preserves iteration order (per H-07). Typed signature forces compile-time catch of wrong-type assignments."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
      - design/gdd/hero-roster.md                    # §C Rule 7 authoritative
    added: 2026-04-22

  - purpose: formation_state_ownership
    status: active
    api: formation_slots_colocated_in_HeroRoster               # _formation_slots: Array[int] inside HeroRoster
    not: separate_FormationAssignment_autoload_owns_slots      # would force rank-7 HeroRoster to read rank-11 FormationAssignment state per tick — violates ADR-0003 rank invariant
    adr: docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
    why: "Economy's per-tick read `roster.get_formation_strength()` must iterate formation heroes. If formation state lived in a separate rank-11 FormationAssignment autoload, HeroRoster (rank 7) would need to forward-read rank-11 state each tick — violates the rank invariant (rank-N may only forward-connect to N+1+ SIGNALS, not read state). Co-locating formation in HeroRoster keeps the read-path rank-correct and single-hop. FormationAssignment System (#17) owns the UI + assignment rules (future ADR); HeroRoster owns the state container. Ownership is of DATA, not of POLICY."
    referenced_by:
      - docs/architecture/ADR-0012-hero-roster-mutation-and-identity.md
