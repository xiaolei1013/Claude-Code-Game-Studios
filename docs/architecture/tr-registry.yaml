# ---------- save-load (design/gdd/save-load-system.md) ----------

- {id: TR-save-load-001, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Single save slot at user://save_slot_1.dat constructed via save_slot_path(slot) helper; .bak suffix for backup", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-002, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Binary envelope: 12-byte header (MAGIC LGLD + uint16 version + uint16 FLAGS + uint32 PAYLOAD_LENGTH) + masked JSON payload + 32-byte HMAC footer", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-003, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "All header uint16/uint32 fields written little-endian via PackedByteArray.encode_u8/u16/u32; decode via decode_u16/u32 on load", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-004, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "HMAC computed over raw header + MASKED payload bytes (not plaintext JSON)", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-005, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "PAYLOAD_LENGTH never used for pre-HMAC buffer allocation; use file_length - 44 for pre-HMAC read budget", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-006, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Each consumer exposes get_save_data() -> Dictionary and load_save_data(data: Dictionary) -> void", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-007, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Header version uint16 = 1 for MVP; mismatch enters MIGRATION state before load_save_data calls", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-008, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Persist triggers: 60s heartbeat, app pause, graceful shutdown, post-migration, scene_boundary_persist signal", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-009, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Scene boundary persist is async-signal pattern: SceneManager awaits save_completed/save_failed before committing transition", created: "2026-04-22", revised: "", status: active}
- {id: TR-save-load-010, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Load fires exactly once per session at launch; never mid-session", created: "2026-04-22", revised: "", status: active}
