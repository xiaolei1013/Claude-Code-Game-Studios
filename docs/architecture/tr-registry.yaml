- {id: TR-scene-manager-030, system: scene-manager, gdd: design/gdd/scene-screen-manager.md, requirement: "Transition overhead (excluding tween time) <5ms on min-spec mobile for request_screen code path", created: "2026-04-22", revised: "", status: active}
