- {id: TR-time-010, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "_process fractional-delta accumulator preserved across pause; never reset to 0 on unpause", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-011, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Persist session high-water field t_session_high_water via max-preserving assignment; signed by Save/Load", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-012, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Heartbeat payload (60s) <=512 bytes: {t_last_persist, t_session_high_water, sim_tick_counter} only", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-013, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "tick_fired(tick_number: int) signal emitted synchronously inside _process; call_deferred prohibited", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-014, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Offline replay does NOT emit tick_fired; Offline Engine invokes batch APIs (compute_offline_batch) directly", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-015, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Platform notifications: mobile NOTIFICATION_APPLICATION_PAUSED/RESUMED; PC NOTIFICATION_WM_WINDOW_FOCUS_OUT/IN", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-016, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "One-shot offline-replay flag is process-scoped (in-memory, not persisted); cold launch re-fires, BG<->FG does not", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-017, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Signals: tick_fired(int), offline_elapsed_seconds(float, bool), flag_suspicious_timestamp_emitted(int, int)", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-018, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "flag_suspicious_timestamp_emitted fires once per launch on false->true bool transition", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-019, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Session-scoped bool flag_suspicious_timestamp resets to false on every cold launch", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-020, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Debug-only: debug_set_unix_time(t), debug_clear_unix_time(), debug_emit_suspicious_timestamp(prev, curr) all runtime-gated by OS.is_debug_build()", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-021, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "All internal wall-clock reads route through _read_wall_clock_unix_time() for mock propagation", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-022, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Offline cap default offline_cap_seconds = 28_800 (8h); safe range 14_400-86_400", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-023, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Offline elapsed formula D.2 uses anchor = max(t_last_persist, t_session_high_water); single composed function", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-024, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "REWIND_TOLERANCE_SECONDS default 300; elapsed_raw < -tolerance -> elapsed=0, flag suspicious", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-025, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Forward jump -> clamp to offline_cap_seconds; emit cap_reached=true alongside offline_elapsed_seconds", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-026, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "offline_tick_budget = int(elapsed_offline_seconds * TICKS_PER_SECOND) - multiply form, not divide", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-027, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Max tick budget at default cap: 576_000 ticks; Offline Engine must replay without blocking main thread", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-028, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Offline replay must complete <=500ms OR chunk per-frame <=16ms on min-spec mobile; never block >5s (ANR)", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-029, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Per-tick dispatch <=150us p99 with 4 subscribers on min-spec hardware", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-030, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "First-launch bootstrap: seed last_persist_ts = t_session_high_water = t_current; emit offline_elapsed=0, cap_reached=false", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-031, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Heartbeat interval 60s default (safe range 15-300); writes t_last_persist and t_session_high_water on every heartbeat and BG entry", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-032, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Save/Load sole permitted external writer: set_last_persist_ts(int) and set_session_high_water(int) on load", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-033, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Offline replay signal order: offline_elapsed_seconds and cap_reached emitted BEFORE first tick_fired", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-034, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "UI pause is substate of FOREGROUND - _process still runs (heartbeat fires), only tick emission suppressed", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-035, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "int64 forward-jump handling must avoid signed overflow (+Inf); D = INT64_MAX - T produces valid clamped output", created: "2026-04-22", revised: "", status: active}
- {id: TR-time-036, system: time, gdd: design/gdd/game-time-and-tick.md, requirement: "Log format on rewind: '[TickSystem] Clock rewind detected: delta=' followed by negative delta", created: "2026-04-22", revised: "", status: active}

# ---------- data-loading (design/gdd/data-loading.md) ----------

- {id: TR-data-loading-001, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "DataRegistry autoload enumerates all .tres under assets/data/ at boot; rank 1 (first)", created: "2026-04-22", revised: "", status: active}
