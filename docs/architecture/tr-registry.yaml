- {id: TR-save-load-012, system: save-load, gdd: design/gdd/save-load-system.md, requirement: "Atomic write: temp->flush->rename pattern via FileAccess.store_buffer() -> bool and DirAccess.rename() -> Error", created: "2026-04-22", revised: "", status: active}
