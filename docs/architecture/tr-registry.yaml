- {id: TR-data-loading-003, system: data-loading, gdd: design/gdd/data-loading.md, requirement: ".tres (Godot text resource) is the only authored format; .res permitted only as .pck compression artifact", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-004, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "All content resources extend abstract GameData base (id: String, display_name: String) using 4.5+ @abstract", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-005, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Every resource declares id: String as first @export field; snake_case; globally unique within type", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-006, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "id is canonical cross-system key; filename is developer hint only, renaming must not break saves", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-007, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Eager-load all content at boot during LOADING state before consumer access", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-008, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Cross-reference DAG rule: no cycles; load order classes->enemies->biomes->dungeons->items->matchup", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-009, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Read-only contract: resolved resources immutable at runtime; no consumer mutates @export fields", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-010, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Hot-reload (dev only) via hot_reload(content_type) gated by is_dev_build compile flag; stripped from shipped builds", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-011, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "States: UNLOADED, LOADING, READY, ERROR, HOT_RELOAD", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-012, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Emits registry_ready signal on successful boot; registry_error(reason, details) on fatal load errors", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-013, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Emits hot_reload_complete(content_type) signal after dev re-enumeration", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-014, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Resolver API: resolve(content_type: String, id: String) -> Resource or null - silent substitution forbidden", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-015, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Typed accessors per category: get_all_classes, get_class_by_id, get_all_enemies, get_enemy_by_id, etc.", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-016, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Duplicate id within content type -> ERROR state; first resource retained, second rejected, log structured error", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-017, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Malformed .tres file skipped with structured warning; state remains READY unless below MIN_CONTENT_COUNT", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-018, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Post-load DAG validation detects circular references -> ERROR state with cycle path logged", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-019, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Missing ref: resolve returns null, logs warning; caller (Save/Load) applies fallback policy", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-020, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Load-time budget <200ms on min-spec mobile (~2GB RAM, Cortex-A53) cold-start for MVP content set", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-021, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "MVP memory: <400KB total across all categories; 256MB mobile ceiling unthreatened", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-022, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Tuning knob data_root_path default res://assets/data; dev/test override allows fixture datasets", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-023, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "min_content_count per-category default {classes:3, enemies:5, biomes:1, dungeons:1, matchup:1}; below->ERROR", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-024, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "missing_id_behavior enum: WARN (prod default) or ASSERT (tests)", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-025, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "lazy_load_categories Array[String] knob for V1.0 migration path; MVP empty", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-026, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Forward-compat: Godot loads by field name, unknown fields ignored, missing fields default - no per-file version stamp", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-027, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Patch-time live content updates NOT supported at runtime; next launch rebuilds full index", created: "2026-04-22", revised: "", status: active}
- {id: TR-data-loading-028, system: data-loading, gdd: design/gdd/data-loading.md, requirement: "Read-only enforcement check in debug/test builds via post-test property snapshot comparison", created: "2026-04-22", revised: "", status: active}

# ---------- scene-manager (design/gdd/scene-screen-manager.md) ----------

