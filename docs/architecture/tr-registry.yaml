# ---------- matchup-resolver (design/gdd/class-vs-enemy-matchup-resolver.md) ----------

- {id: TR-matchup-resolver-001, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Define class_name MatchupResolver extends RefCounted in src/gameplay/matchup/matchup_resolver.gd", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-002, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "MatchupResolver is injectable instance class; NOT static-only; NOT autoload; methods are regular func", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-003, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "DefaultMatchupResolver extends MatchupResolver provides production impl; created once at boot and injected", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-004, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Orchestrator injection: zero-arg _init + lazy-default construction in _ready() + public setters set_matchup_resolver / set_combat_resolver (autoload _init is called with zero args per autoload.md Claim 4 [VERIFIED]; see ADR-0003 Amendment #3 + ADR-0009)", created: "2026-04-22", revised: "2026-04-22", status: active}
- {id: TR-matchup-resolver-005, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "MatchupResolver is stateless: zero instance vars at class scope, zero signals, no caches, no RNG, no time-dependent reads", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-006, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Define MatchupResult value type: is_advantaged: bool, matched_archetypes: Array[String] (extends RefCounted)", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-007, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "matched_archetypes contains archetype strings only - never HeroInstance or instance_id references", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-008, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Public API: resolve_formation_matchup(formation, enemy_archetype) -> MatchupResult", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-009, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Public API: resolve_floor_matchup(formation, floor_archetypes) -> MatchupResult (caller deduplicates)", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-010, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Private _is_class_counter(class_data, enemy_archetype): string equality class_data.counter_archetype == enemy_archetype", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-011, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Aggregation rule: formation advantaged iff n > N/2 (integer division, strict majority); MVP N=3 means n>=2", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-012, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Crossing threshold yields single 1.5x application; no stacking beyond threshold", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-013, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "matched_archetypes deduplicated and sorted alphabetically before return (byte-identical equivalence for goldens/snapshots)", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-014, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Per-kill evaluation model: resolver called once per enemy death with that enemy's archetype; no 'primary archetype' concept", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-015, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Formation parameter MUST be frozen dispatch snapshot, never live HeroRoster.get_formation_heroes() read at resolution time", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-016, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Empty formation guard: returns {false, []} immediately; no iteration, no DataRegistry calls, no error", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-017, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Null class_data from DataRegistry is silently skipped and excluded from threshold N (all-null => empty-formation equivalent)", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-018, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Empty/null enemy_archetype: returns {false, []} and calls push_error containing 'empty or null enemy_archetype'", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-019, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Unknown/V1.0/garbage archetype returns {false, []} silently; no hardcoded archetype list in resolver", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-020, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "String comparison is case-sensitive; no toLower normalization allowed", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-021, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Pure function determinism: identical inputs always yield field-equal MatchupResult (Pillar 1 offline replay)", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-022, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Offline Engine calls resolve_floor_matchup exactly once at dispatch snapshot; replay uses snapshot.matched_archetypes.has(archetype) lookup", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-023, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Offline snapshot stores MatchupResult + class_ids array; does NOT store live HeroInstance refs", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-024, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "During offline replay, DataRegistry.resolve and MatchupResolver.* call counts MUST be exactly 0", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-025, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Offline snapshot must freeze floor_archetypes at dispatch; NOT re-derive from live Floor.enemy_list at replay", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-026, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Orchestrator emits enemy_killed(tier, is_matchup_advantaged) signal to Economy; resolver exposes no signals", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-027, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Economy applies MATCHUP_GOLD_MULTIPLIER=1.5 registry constant; resolver knows no gold values", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-028, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Combat Resolution scales per-enemy throughput via MATCHUP_THROUGHPUT_FACTOR_ADV/DIS using resolver's is_advantaged", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-029, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Orchestrator must not dispatch empty formation (Formation Assignment precondition); empty guard is backstop", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-030, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Structural CI check: matchup_resolver.gd has zero class-scope vars, zero signals, no static public func, no autoload entry", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-031, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Performance budget: 10,000 resolve calls <200ms on CI ubuntu-latest; <50ms on Steam Deck baseline", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-032, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "Test pattern: spy subclass extends MatchupResolver overriding public methods; no mocking of static funcs", created: "2026-04-22", revised: "", status: active}
- {id: TR-matchup-resolver-033, system: matchup-resolver, gdd: design/gdd/class-vs-enemy-matchup-resolver.md, requirement: "MatchupResult equality must be asserted field-by-field (RefCounted ref-equality trap); Array == is structural", created: "2026-04-22", revised: "", status: active}

# ---------- combat (design/gdd/combat-resolution.md) ----------

- {id: TR-combat-001, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "CombatResolver is class_name extends RefCounted; stateless; no instance vars, no caches, no RNG; pure function of inputs", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-002, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Two public entry points: emit_events_in_range(formation, floor, start, end) and compute_offline_batch(formation, floor, tick_budget)", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-003, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Foreground emit_events_in_range and offline compute_offline_batch MUST share same private helpers to guarantee parity", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-004, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Concrete production impl DefaultCombatResolver extends CombatResolver; tests inject spy subclasses via DI", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-005, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "action_cooldown_ticks pre-guards speed<=0 returning 1; clamps via maxi(1, floori(SPEED_BASE/speed))", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-006, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "formation_dps_per_tick = sum(hero.attack * hero.speed)/SPEED_BASE; realised range with current MVP class .tres + LEVEL_CAP=15 is approximately [0.0, ~555.0] (empty formation=0.0; 3-rogue L15 upper bound ~554.4; 3-warrior L1 ~43.2; 1-warrior+1-mage+1-rogue L1 ~49.6). Earlier draft cited [0.0, 2.31] which assumed max attack <=11, max speed <=7 per hero — that constraint did not survive class .tres authoring in Sprint 4. See TD-011 (RESOLVED 2026-04-27 via S8-S9: accept current .tres values; revise TR range here).", created: "2026-04-22", revised: "2026-04-27", status: active}
- {id: TR-combat-007, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "effective_dps = raw_dps * matchup_throughput_factor * hp_bonus_factor applied per-enemy in kill schedule", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-008, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "hp_bonus_factor = mini(formation_total_hp / floor_total_enemy_attack, 1.0); continuous [0.0, 1.0]", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-009, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "survived := (hp_bonus_factor >= 0.5); inclusive boundary; losing_run = !survived", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-010, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "_kill_schedule_for_loop computes per-enemy ticks_to_kill = ceili(base_hp / effective_dps) with integer arithmetic", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-011, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "All integer outputs use floori()/ceili()/maxi()/mini() variants; no float accumulation across calls", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-012, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "MatchupResolver.resolve_formation_matchup called once per distinct enemy_list entry (<=5 per MVP floor)", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-013, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "KillEvent fields: enemy_id StringName, archetype StringName, tier int, is_boss bool, kill_tick int; equals() deep-equality", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-014, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "CombatTickEvents fields: kills Array[KillEvent], loop_completed_ticks Array[int], first_clear_in_range bool", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-015, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "CombatBatchResult fields: kills_by_archetype Dict[StringName,int], kills_by_tier Dict[int,int], loops_completed, first_clear_tick, hp_bonus_factor, survived, final_tick", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-016, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Dictionary equality uses key-by-key dict_equals walk; hash-based equality is forbidden for correctness comparisons", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-017, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Float fields compared via is_equal_approx, never ==; typed dictionaries (Godot 4.4+) engine-checked at assignment", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-018, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Orchestrator owns 'already-fired' flag; Combat only reports first_clear markers per-call", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-019, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Empty formation returns empty result; push_warning 'empty formation'; no division by zero", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-020, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Unresolvable class_id skipped; contributes 0 to dps and hp; push_error logs via optional error_logger Callable DI", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-021, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Repeated compute_offline_batch calls with identical args return field-equal CombatBatchResult; input formation unmutated", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-022, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Foreground+offline parity: union of emit_events_in_range events equals compute_offline_batch kills for same (formation,floor,T)", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-023, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Offline batch returns aggregate counts only (NOT per-event) for long runs (15k+ kills); foreground enumerates per-event", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-024, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "AC-14 perf: compute_offline_batch(576000 ticks) <=100ms p95 on CI runner; <=200ms p95 on min-spec mobile", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-025, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "ceili guarantees kill_tick >= 1 always; no tick-0 instantaneous kill events", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-026, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Clock-rewind / frame-drop path: closed-form schedule is time-anchored, recovers via range arg", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-027, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "No RNG anywhere in Combat; no time-dependent reads; no float accumulation across calls", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-028, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "is_boss flag propagated per-event in schedule regardless of mid-queue position", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-029, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Combat does NOT subscribe to tick_fired; invoked by Orchestrator synchronously within _on_tick", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-030, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "Combat emits no signals; Orchestrator owns all signal emission to Economy/UI", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-031, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "All tuning values (SPEED_BASE, MATCHUP_THROUGHPUT_FACTOR_ADV/DIS, LOSING_RUN_LOOT_FACTOR) in assets/data/combat_config.tres", created: "2026-04-22", revised: "", status: active}
- {id: TR-combat-032, system: combat, gdd: design/gdd/combat-resolution.md, requirement: "action_cooldown_ticks bounded [1, SPEED_BASE]; speed>SPEED_BASE clamped via maxi(1,...)", created: "2026-04-22", revised: "", status: active}

# ---------- orchestrator (design/gdd/dungeon-run-orchestrator.md) ----------

- {id: TR-orchestrator-001, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "FSM with 5 states: NO_RUN, DISPATCHING, ACTIVE_FOREGROUND, ACTIVE_OFFLINE_REPLAY, RUN_ENDED", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-002, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Complete 5x6 state-trigger matrix defined; every cell lands in documented next state OR logs push_error 'invalid'", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-003, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "RunSnapshot is RefCounted holding all per-dispatch state; persisted via Save/Load to_dict/from_dict", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-004, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "RunSnapshot.formation_snapshot is deep copy (.duplicate(true)) from HeroRoster; never re-read mid-dispatch", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-005, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "RunSnapshot fields include losing_run (explicit bool, NOT re-derived on load), floor_clear_emitted, matchup_cache, kill_schedule", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-006, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Floor serialized by id only (serialize-by-id); resolved via DataRegistry on load; null -> NO_RUN reset", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-007, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Orchestrator subscribes to GameTime.tick_fired only in ACTIVE_FOREGROUND; unsubscribes on exit", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-008, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "_on_tick_fired calls combat_resolver.emit_events_in_range(formation, floor, last_emitted, current_tick)", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-009, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Clock-rewind and duplicate-tick guard: if current_tick <= last_emitted, early return; warn on strict rewind only", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-010, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "compute_offline_run(tick_budget) returns OfflineRunResult; emits floor_cleared_first_time(floor_index, biome_id, losing_run) in lockstep with foreground", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-011, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "D.4 loop-walk algorithm over kill_schedule; partial_loop_kills walked in tick order; NOT dict-walk on kills_by_archetype", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-012, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "_build_matchup_cache pre-populates entry for every archetype in kill_schedule; no KeyError possible during replay", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-013, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "matchup_cache built once at DISPATCHING; per-kill replay reads cache; zero resolver calls during offline replay", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-014, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "attribute_kill_gold(tier, advantaged, losing_run) = floori(BASE_KILL[tier] * matchup_mult * loot_factor); output [5,120]", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-015, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "FLOOR_CLEAR_BONUS is 1-based indexed [1..5]; index 0 is undefined sentinel; assert floor_index in [1,5]", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-016, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Per-dispatch floor_clear_emitted gates first-clear emission; reset to false on new dispatch", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-017, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Three-layer idempotency: Combat stateless markers / Orchestrator per-dispatch flag / Economy per-lifetime monotonic-credit", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-018, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Orchestrator calls Economy.add_gold() and Economy.try_award_floor_clear(floor_index, bonus_amount) with LOSING factor pre-applied", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-019, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Per-tick performance budget: <=2ms p95 on min-spec mobile; 0-1 kills per tick typical", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-020, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Mid-run formation reassignment (option a locked): formation_reassignment_committed triggers ACTIVE_FOREGROUND->RUN_ENDED->DISPATCHING", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-021, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "formation_browse_opened signal is IGNORED (read-only); only formation_reassignment_committed triggers run-end", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-022, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "boss_killed.emit(enemy_id) fires on is_boss=true regardless of queue position; no convention enforcement", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-023, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Orchestrator registered as script autoload (/root/DungeonRunOrchestrator); resolvers lazy-default in _ready()", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-024, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "DI setters: set_combat_resolver, set_matchup_resolver, set_error_logger; tests inject spies before _ready", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-025, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Owned signals: enemy_killed(tier, archetype, advantaged), boss_killed(enemy_id), floor_cleared_first_time(floor_index, biome_id, losing_run), validation_failed(reason, payload)", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-026, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "DISPATCHING validation rejects empty formation -> RUN_ENDED + validation_failed('empty_formation')", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-027, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "DISPATCHING queries FloorUnlock.is_unlocked(floor_index); locked -> RUN_ENDED + validation_failed('floor_locked')", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-028, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Foreground/offline parity: identical gold totals, per-archetype counts, floor_cleared_first_time count/payload for same (formation,floor,T)", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-029, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "ACTIVE_OFFLINE_REPLAY error path: offline errors transition to RUN_ENDED via validation_failed('offline_replay_error'); partial gold retained, no rollback", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-030, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "Save/Load consumer contract: get_save_data/load_save_data; namespace key 'orchestrator'; round-trip via RunSnapshot.equals()", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-031, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "floor_was_valid bool on RunSnapshot distinguishes 'lost badly' from 'floor authoring bug' on empty Combat result", created: "2026-04-22", revised: "", status: active}
- {id: TR-orchestrator-032, system: orchestrator, gdd: design/gdd/dungeon-run-orchestrator.md, requirement: "DISPATCH_DEBOUNCE_MS=250 prevents accidental double-dispatch; OFFLINE_REPLAY_CHUNK_TICKS=0 default single-shot", created: "2026-04-22", revised: "", status: active}

# ---------- economy (design/gdd/economy-system.md) ----------

- {id: TR-economy-001, system: economy, gdd: design/gdd/economy-system.md, requirement: "Gold stored as int64 with GOLD_SANITY_CAP=1T; save key gold_balance; balance never negative", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-002, system: economy, gdd: design/gdd/economy-system.md, requirement: "All formulas use integer arithmetic with floor()/floori() truncation; no float accumulation into save", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-003, system: economy, gdd: design/gdd/economy-system.md, requirement: "Economy subscribes to tick_fired at 20 Hz for foreground drip; NEVER uses _process(delta)", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-004, system: economy, gdd: design/gdd/economy-system.md, requirement: "Offline replay uses compute_offline_batch(tick_budget); NOT per-tick signal replay; closed-form O(1) drip multiplication", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-005, system: economy, gdd: design/gdd/economy-system.md, requirement: "drip_per_tick = floor(BASE_DRIP[floor_tier] * formation_strength_factor * matchup_drip_factor)", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-006, system: economy, gdd: design/gdd/economy-system.md, requirement: "BASE_DRIP table: F1=2, F2=4, F3=7, F4=12, F5=8 (non-monotonic post Pass-3B); MATCHUP_DRIP_BONUS default 1.0", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-007, system: economy, gdd: design/gdd/economy-system.md, requirement: "BASE_KILL lookup: tier1=10, tier2=35, tier3=80; MATCHUP_GOLD_MULTIPLIER=1.5", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-008, system: economy, gdd: design/gdd/economy-system.md, requirement: "recruit_cost = floor(BASE_RECRUIT[tier] * RECRUIT_RATIO^copies_owned); RECRUIT_RATIO=1.8", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-009, system: economy, gdd: design/gdd/economy-system.md, requirement: "level_cost = floor(BASE_LEVEL[tier] * LEVEL_RATIO^(current_level-1)); LEVEL_RATIO=1.6; LEVEL_CAP=15 returns -1 past cap", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-010, system: economy, gdd: design/gdd/economy-system.md, requirement: "FLOOR_CLEAR_BONUS table: F1=500, F2=1200, F3=3000, F4=7500, F5=18000; 1-based indexing", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-011, system: economy, gdd: design/gdd/economy-system.md, requirement: "floor_clear_bonus_credited: Dictionary[int, int] - persisted monotonic-credit ceiling per floor_index", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-012, system: economy, gdd: design/gdd/economy-system.md, requirement: "try_award_floor_clear(floor_index, bonus_amount)->bool: credits max(0, bonus-already_credited); returns true if credit >0", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-013, system: economy, gdd: design/gdd/economy-system.md, requirement: "try_award_floor_clear emits first_clear_awarded(floor_index) exactly once per floor per save lifetime (only on first non-zero credit)", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-014, system: economy, gdd: design/gdd/economy-system.md, requirement: "Range guard on try_award_floor_clear: floor_index<1 or >5 -> push_error + return false; negative bonus -> push_error + return false", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-015, system: economy, gdd: design/gdd/economy-system.md, requirement: "try_spend(amount)->bool is atomic: single-threaded GDScript; rejects if balance<amount; no partial deduction; no signal on rejection", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-016, system: economy, gdd: design/gdd/economy-system.md, requirement: "try_spend(0) returns true no-op; try_spend(negative) returns false with push_error", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-017, system: economy, gdd: design/gdd/economy-system.md, requirement: "Replay offline: suppress gold_changed signal emission (is_offline_replay flag); emit once with total delta after", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-018, system: economy, gdd: design/gdd/economy-system.md, requirement: "Offline replay RNG seed = t_last_persist XOR offline_tick_budget; same seed -> same outcomes every replay", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-019, system: economy, gdd: design/gdd/economy-system.md, requirement: "AC H-10 perf: compute_offline_batch(576000) < 500ms wall clock on min-spec; per-tick avg < 0.87us", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-020, system: economy, gdd: design/gdd/economy-system.md, requirement: "Save/Load consumer: get_save_data/load_save_data; keys: gold_balance, lifetime_gold_earned, floor_clear_bonus_credited", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-021, system: economy, gdd: design/gdd/economy-system.md, requirement: "Orchestrator applies LOSING_RUN_LOOT_FACTOR (0.5) to kill gold + floor-clear bonus BEFORE calling Economy; Economy does NOT re-apply", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-022, system: economy, gdd: design/gdd/economy-system.md, requirement: "Drip is run-outcome-independent (NOT halved on LOSING); Economy's tick_fired subscription has no access to losing_run state", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-023, system: economy, gdd: design/gdd/economy-system.md, requirement: "Display thresholds: 1K/1M/1B/1T abbreviation thresholds; raw int64 never shown to player above 999", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-024, system: economy, gdd: design/gdd/economy-system.md, requirement: "LOSING first-clear + later WIN credits the delta (FLOOR_CLEAR_BONUS - already_credited); credited total monotonically capped", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-025, system: economy, gdd: design/gdd/economy-system.md, requirement: "IDLE/ACTIVE/OFFLINE_REPLAY/PAUSED states; state not persisted - re-derived on session start", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-026, system: economy, gdd: design/gdd/economy-system.md, requirement: "PAUSED state: Game Time does NOT emit tick_fired during pause; Economy receives no ticks; no ignore-branch needed on consumer side", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-027, system: economy, gdd: design/gdd/economy-system.md, requirement: "int64 overflow Fermi-safe: 400x margin at aggressive V1.0 rates over 10 years; no BigInt library needed", created: "2026-04-22", revised: "", status: active}
- {id: TR-economy-028, system: economy, gdd: design/gdd/economy-system.md, requirement: "Tuning knobs in assets/data/economy_config.tres; no economy value hardcoded in GDScript", created: "2026-04-22", revised: "", status: active}

# ---------- hero-roster (design/gdd/hero-roster.md) ----------

- {id: TR-hero-roster-001, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "HeroInstance is class_name extends RefCounted; lightweight data record; NOT a Godot Resource (no .tres file)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-002, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "HeroInstance fields: instance_id int, class_id String, display_name String, current_level int, xp int (reserved V1.0)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-003, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "HeroInstance.to_dict/from_dict produce exactly five-field dict; no other per-hero data persisted", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-004, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "HeroInstance has no mutation methods; all mutation via HeroRoster methods", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-005, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "HeroRoster is class_name extends Node; _heroes stored as Dictionary keyed by instance_id int -> HeroInstance", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-006, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "MAX_ROSTER_SIZE=30; FORMATION_SIZE=3; enforced at config load with constraint MAX_ROSTER_SIZE >= FORMATION_SIZE", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-007, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "_formation_slots: Array size FORMATION_SIZE; elements are instance_id int or 0 (empty)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-008, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "add_hero(class_id)->HeroInstance|null: returns null on cap or unresolvable class; increments _next_instance_id AFTER success", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-009, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Signals emitted: hero_recruited(instance), hero_leveled(id, old, new), hero_removed(id, class_id, display_name)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-010, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "All signals SUPPRESSED during load_save_data() boot validation", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-011, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "instance_id is monotonic positive int (no UUIDs); _next_instance_id only ever incremented; never reused after remove", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-012, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "instance_id, class_id, display_name immutable after add_hero(); downstream systems rely on cross-session identity stability", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-013, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "set_hero_level clamps new_level to [1, LEVEL_CAP=15] with push_warning on out-of-range; returns false if id unknown", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-014, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "set_formation_slot validates id and auto-clears prior slot if same id exists elsewhere", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-015, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Boot validation order: resolve class_ids / clear stale formation slots / trim over-cap (preserve lowest ids) / repair _next_instance_id", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-016, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Orphaned heroes appended to session-scoped _orphaned_heroes list; Save/Load surfaces single non-blocking notice", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-017, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "get_formation_strength() = clamp(1.0 + (avg_formation_level - 1) * 0.2, 1.0, 3.0); empty formation returns 1.0 via guard", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-018, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "avg_formation_level = float(sum(current_level))/size(formation); skips empty slots", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-019, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Save dict shape: {heroes: Array[Dict], formation_slots: Array[int], next_instance_id: int}; per-hero via HeroInstance.to_dict", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-020, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "First-launch: seed_first_launch_state() creates Warrior id=1, display_name='Theron', current_level=1 in slot 0; emits hero_recruited", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-021, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Seed hero name 'Theron' is hardcoded constant (NOT from random pool) for QA reproducibility across reinstalls", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-022, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Name pool selection: uniform random over unused pool subset; fallback '{base} the {Ordinal}' when exhausted", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-023, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Name pool >=20 names per class (MVP Warrior/Mage/Rogue); pools loaded via DataRegistry.resolve('name_pools', class_id)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-024, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "AC H-14 perf: get_formation_strength p99 < 50us on min-spec (Steam Deck 1280x800)", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-025, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Duplicate instance_id in save -> last-written-wins (Dictionary semantics); push_error logged; no crash", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-026, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "get_all_heroes default sort: BY_CLASS (registry order) then BY_LEVEL_DESC tiebreaker", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-027, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "get_formation_heroes() skips empty slots; returns ordered by slot index; consumed by Combat/Orchestrator/MatchupResolver", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-028, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "_heroes, _formation_slots, _next_instance_id are underscore-private; no external read/write; encapsulation enforced at code review", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-029, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Save round-trip preserves all 10+ heroes field-for-field; _next_instance_id preserved across remove/add sequences", created: "2026-04-22", revised: "", status: active}
- {id: TR-hero-roster-030, system: hero-roster, gdd: design/gdd/hero-roster.md, requirement: "Tuning knobs in assets/data/config/roster_config.tres; no hardcoded Roster values in GDScript", created: "2026-04-22", revised: "", status: active}

# ---------- floor-unlock (design/gdd/floor-unlock-system.md) ----------

- {id: TR-floor-unlock-001, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "FloorUnlockSystem is class_name extends Node; autoload registered as 'FloorUnlock' (name orthogonal to class_name)", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-002, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "_unlock_state: Dictionary[String, int] - typed dict; key=biome_id, value=highest cleared floor_index", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-003, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Autoload order: DataRegistry(1), SaveLoadSystem(2), Economy(3), FloorUnlock(4), DungeonRunOrchestrator(5); FloorUnlock MUST be before Orchestrator", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-004, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Public API: is_unlocked(floor_index)->bool; is_biome_available/completed; get_highest_cleared; get_floor_state; get_available_biomes", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-005, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Fresh-save default: _unlock_state = {'forest_reach': 0}; planned_v1 biomes NOT seeded (absence = unavailable)", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-006, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Subscribes to DungeonRunOrchestrator.floor_cleared_first_time in _ready() using default flags (NOT CONNECT_DEFERRED)", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-007, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Signal payload: floor_cleared_first_time(floor_index: int, biome_id: String, losing_run: bool) - 3-arg signature", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-008, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Monotonicity invariant R4: _unlock_state[biome_id] strictly non-decreasing; no decrement code path (except clamp-on-load)", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-009, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "LOSING first-clear advances lantern identically to WIN (R5); losing_run accepted but not read by this system", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-010, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "advance_unlock uses max-form: h_new = max(current, floor_index); write only when h_new > current; duplicate signal is silent no-op", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-011, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "1-based floor_index convention; floor_index==0 is sentinel; is_unlocked(0) returns false", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-012, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Handler guards in order: is_biome_available, BIOME_FLOOR_COUNT.has(biome_id), floor_index in [1,N]; errors routed through _error_logger", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-013, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "BIOME_FLOOR_COUNT populated in _ready() from DataRegistry.resolve('biomes', id).dungeons[0].floors.size()", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-014, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "FloorState enum {UNAVAILABLE, LOCKED, ACCESSIBLE, CLEARED}; derived from biome availability + highest_cleared", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-015, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Save/Load consumer contract: get_save_data/load_save_data; namespace key 'floor_unlock'; payload {'highest_cleared': {biome_id: int}}", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-016, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "load_save_data per-value processing order: type guard -> lossy-cast warn -> int() cast -> under-range clamp -> over-range clamp -> write", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-017, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "JSON.parse_string returns numbers as float; MUST int() cast before writing to typed Dictionary[String,int] to avoid runtime raise", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-018, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Type guard rejects non-numeric (String, NIL, bool) values; resets to 0 with _warning_logger; _unlock_state.has(biome_id)=true after", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-019, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Missing 'floor_unlock' key on load -> fresh-save default (forward-compat); no error", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-020, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Stale biome_id in save preserved (not deleted) with push_warning; filtered via is_biome_available returning false", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-021, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "DI fields: _warning_logger Callable, _error_logger Callable; tests inject capturing closures; production closure dispatches to push_warning/push_error", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-022, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "debug_unlock_all flag guarded by OS.is_debug_build(); returns CLEARED for all in-range floors; placed after range guards, before highest branches", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-023, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "get_available_biomes filters DataRegistry biomes by status='active'; UI consumers MUST use this, NOT Biome.status directly", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-024, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "is_biome_completed(b) requires N>0 guard AND highest==N AND is_biome_available; prevents V1.0 partial-ship false-positive", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-025, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "No save dirty-marking call; heartbeat (60s cadence per Save/Load Rule 5) captures advanced state; crash-window recovery conditional on Offline Engine replay", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-026, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Orchestrator queries FloorUnlock.is_unlocked(floor_index) at DISPATCHING; locked -> validation_failed + RUN_ENDED", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-027, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Unlock/Victory UI #25 MUST fire identical fanfare for WIN and LOSING first-clears (no differentiation); cozy-register lock", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-028, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "UI consumers (#17/#19/#23/#25) MUST NOT branch on how floor reached ACCESSIBLE; no losing_unlock per-floor flag recorded", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-029, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Under-range clamp: negative cast -> 0 + _warning_logger; over-range clamp: value>N -> N + _warning_logger; clamp-rather-than-reject rule", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-030, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Offline replay path (Orchestrator C.4) MUST emit floor_cleared_first_time in lockstep with foreground (I.15 fix); otherwise silent Pillar 1 violation", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-031, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "active_biome_mvp knob sourced from ProjectSettings 'floor_unlock/active_biome_mvp'; validated against Biome DB status='active' at _ready", created: "2026-04-22", revised: "", status: active}
- {id: TR-floor-unlock-032, system: floor-unlock, gdd: design/gdd/floor-unlock-system.md, requirement: "Dual-warning required on float value that is both lossy AND over-range (e.g., 99.7): step 2 lossy warn + step 5 clamp warn; no short-circuit", created: "2026-04-22", revised: "", status: active}
