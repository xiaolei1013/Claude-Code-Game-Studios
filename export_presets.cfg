; Export presets for Lantern Guild — Sprint 19 S19-M5 RC build pipeline scaffold.
;
; Edit these via the Godot editor's Project → Export dialog rather than
; hand-editing this file when possible. Hand-edits have to stay in sync with
; what the editor expects on next save (it will rewrite the file on next
; export run).
;
; Export-template prerequisites (per platform):
;   - Linux x86_64 (Steam Deck primary target): the editor's
;     "Manage Export Templates" dialog must download the matching
;     v4.6.1.stable.mono templates before `tools/build/build.sh linux` can run.
;   - Windows / macOS: same — install templates via the editor before invoking
;     the build script.
;
; ADR-0017 (HD-2D rendering pipeline pivot) note: the Linux Steam-Deck preset
; targets the canonical 1280×800 native resolution + 60 fps stable performance
; budget per technical-preferences.md. Forward+ rendering, Vulkan backend.

[preset.0]

name="Linux/SteamDeck"
platform="Linux"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="tests/*, prototypes/*, .claude/*, production/*"
export_path="build/linux/lantern_guild_steamdeck.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/architecture="x86_64"
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host_ip_address"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="#!/usr/bin/env bash
export DISPLAY=:0
unzip -o -q \"{temp_dir}/{archive_name}\" -d \"{temp_dir}\"
\"{temp_dir}/{exe_name}\" {cmd_args}"
ssh_remote_deploy/cleanup_script="#!/usr/bin/env bash
kill $(pgrep -x -f \"{temp_dir}/{exe_name} {cmd_args}\")
rm -rf \"{temp_dir}\""
dotnet/include_scripts_content=false
dotnet/include_debug_symbols=true
dotnet/embed_build_outputs=false

